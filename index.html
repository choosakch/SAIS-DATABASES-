<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAIS DATABASE 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body class="bg-[#F4F4F4] text-gray-800 antialiased overflow-x-hidden overscroll-y-contain font-sans">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useCallback } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, ChevronLeft, AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, AlertTriangle, RefreshCw, Cloud, CloudOff, BarChart2, Filter, RotateCcw, Activity, ShieldAlert, Target, Award, Package, Eye, MessageSquare, Search, History, Settings } from 'https://esm.sh/lucide-react@0.300.0';

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyvVssxbmdOnE5wypreTNxi9eYnDpkgXWO5grTMU1LklyuP7LwmON_X4YdZumxgS5uX/exec';
    
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "Close OIL", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [{ value: 'all', label: 'ทุกเดือนในระบบ' }, { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' }, { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' }, { value: '05', label: 'พฤษภาคม' }, { value: '06', label: 'มิถุนายน' }, { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' }, { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' }, { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }];
    const DEFAULT_INSPECTORS = ["Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang", "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti", "Narong Robrum", "Chakrin Dangwichai"];

    const formatDateToDDMMYY = (d) => { if (!d) return '-'; const date = new Date(d); return isNaN(date.getTime()) ? '-' : `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getFullYear()).slice(-2)}`; };
    const formatDateForInput = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; };
    const getMonthOnly = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : String(date.getMonth() + 1).padStart(2, '0'); };
    const formatSyncTime = (d) => d ? `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}` : '';
    const calculateSLA = (d, status) => {
      if (!d) return { text: '-', status: 'none' };
      if (['Passed with Completed', 'Close OIL', 'ยกเลิก'].includes(status)) return { text: 'Closed', status: 'closed' };
      if (!['Failed', 'Passed with OIL'].includes(status)) return { text: '-', status: 'none' };
      const inspectDate = new Date(d); if (isNaN(inspectDate.getTime())) return { text: 'Invalid', status: 'none' };
      const deadline = new Date(inspectDate); deadline.setDate(deadline.getDate() + (status === 'Failed' ? 7 : 28));
      const today = new Date(); today.setHours(0,0,0,0); deadline.setHours(0,0,0,0);
      const diff = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) return { text: `Overdue ${Math.abs(diff)} วัน`, status: 'overdue', isOverdue: true };
      if (diff === 0) return { text: `ครบกำหนดวันนี้`, status: 'warning', isOverdue: false };
      return { text: `เหลือ ${diff} วัน`, status: 'pending', isOverdue: false };
    };
    const generateUniqueId = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
    const parseRemarkHistory = (str) => { try { const p = JSON.parse(str); return Array.isArray(p) ? p : [{ version: '0', text: str, date: '-', author: 'System' }]; } catch(e) { return str ? [{ version: '0', text: str, date: '-', author: 'System' }] : []; } };

    function App() {
      const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
      
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('pending'); 
      const [filterMonth, setFilterMonth] = useState(currentMonthStr);
      const [searchTerm, setSearchTerm] = useState('');
      const [dashFilters, setDashFilters] = useState({ inspector: 'all', product: 'all', type: 'all', condition: 'all', status: 'all', version: 'all' });
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 30; 
      const [toast, setToast] = useState(null);
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [inspectorsData, setInspectorsData] = useState(() => {
        try {
          const saved = localStorage.getItem('sais_inspectors_data');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return DEFAULT_INSPECTORS.map(name => ({ name, certs: [...PRODUCT_LINES] }));
      });

      useEffect(() => {
        localStorage.setItem('sais_inspectors_data', JSON.stringify(inspectorsData));
      }, [inspectorsData]);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const closeViewModal = () => setViewRecord(null);

      const initialFormState = { equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '', inspectorName: '', productLine: '', type: '', jobSite: '', unit: '', preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '', newRemark: '', version: '0', versionDate: '' };
      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');

      const fetchRecords = useCallback(async (isSilent = false) => {
        if (!isSilent) setSyncStatus('syncing');
        try {
          const res = await fetch(GAS_WEB_APP_URL); if (!res.ok) throw new Error('Net Error');
          const data = await res.json();
          if (Array.isArray(data)) { setRecords(data.filter(i => i.id && i.id.toString().trim() !== '')); setSyncStatus('success'); setLastSyncedAt(new Date()); } 
          else { setRecords([]); setSyncStatus('idle'); }
        } catch (e) { setSyncStatus('error'); if (!isSilent) showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error'); }
      }, []);

      useEffect(() => { fetchRecords(); }, [fetchRecords]);

      useEffect(() => {
        let startY = 0;
        const ts = (e) => { if (window.scrollY === 0) startY = e.touches[0].clientY; };
        const te = (e) => { if (window.scrollY === 0 && startY > 0 && e.changedTouches[0].clientY - startY > 100) { showToast('อัปเดตข้อมูล...', 'success'); fetchRecords(); } startY = 0; };
        window.addEventListener('touchstart', ts, { passive: true }); window.addEventListener('touchend', te, { passive: true });
        return () => { window.removeEventListener('touchstart', ts); window.removeEventListener('touchend', te); };
      }, [fetchRecords]);

      useEffect(() => {
        const handleScroll = () => { setIsNavVisible(window.scrollY < lastScrollY || window.scrollY < 50); setLastScrollY(window.scrollY); };
        window.addEventListener('scroll', handleScroll, { passive: true }); return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      useEffect(() => { setCurrentPage(1); }, [activeTab, filterMonth, searchTerm, dashFilters]);

      const latestInspectionDate = useMemo(() => {
        const sorted = [...records].sort((a, b) => new Date(b.inspectionDate || 0) - new Date(a.inspectionDate || 0)); return sorted[0]?.inspectionDate || '';
      }, [records]);

      const displayedRecords = useMemo(() => {
        return records.filter(rec => {
          if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
          if (searchTerm) { const s = searchTerm.toLowerCase(); if (!String(rec.equipmentNo||'').toLowerCase().includes(s) && !String(rec.jobSite||'').toLowerCase().includes(s)) return false; }
          const v = rec.version || '0';
          if (activeTab === 'pending') return v === '0';
          if (activeTab === 'oil') return v !== '0' || ['Passed with OIL', 'Failed', 'Close OIL'].includes(rec.saisStatus);
          return true;
        }).sort((a, b) => {
           const dA = new Date(a.inspectionDate || 0).getTime();
           const dB = new Date(b.inspectionDate || 0).getTime();
           if (!isNaN(dA) && !isNaN(dB)) {
               if (dA !== dB) return dA - dB;
           }
           return parseInt(a.id || 0) - parseInt(b.id || 0);
        });
      }, [records, filterMonth, activeTab, searchTerm]);

      const totalPages = Math.ceil(displayedRecords.length / ITEMS_PER_PAGE);
      const paginatedRecords = useMemo(() => displayedRecords.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE), [displayedRecords, currentPage]);

      const filteredDash = useMemo(() => records.filter(rec => {
        if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
        if (dashFilters.inspector !== 'all' && rec.inspectorName !== dashFilters.inspector) return false;
        if (dashFilters.product !== 'all' && rec.productLine !== dashFilters.product) return false;
        if (dashFilters.type !== 'all' && rec.type !== dashFilters.type) return false;
        if (dashFilters.condition !== 'all' && rec.condition !== dashFilters.condition) return false;
        if (dashFilters.status !== 'all' && rec.saisStatus !== dashFilters.status) return false;
        if (dashFilters.version !== 'all' && (rec.version || '0') !== dashFilters.version) return false;
        return true;
      }), [records, filterMonth, dashFilters]);

      const handleInput = (e) => { setFormData(p => ({ ...p, [e.target.name]: e.target.value })); setValidationError(''); };
      
      const openAddModal = () => { 
        setFormData({ ...initialFormState, inspectionDate: formatDateForInput(latestInspectionDate) || (filterMonth !== 'all' ? `2026-${filterMonth}-01` : '') }); 
        setEditId(null); 
        setValidationError(''); 
        setIsModalOpen(true); 
      };
      
      const closeModal = () => setIsModalOpen(false);
      const openViewModal = (r) => setViewRecord(r);
      const openEditModal = (r) => { 
        setFormData({ 
          ...r, 
          inspectionDate: formatDateForInput(r.inspectionDate),
          generatedDate: formatDateForInput(r.generatedDate),
          versionDate: formatDateForInput(r.versionDate),
          newRemark: '' 
        }); 
        setEditId(r.id); 
        setValidationError(''); 
        setIsModalOpen(true); 
      };

      const syncDb = async (payload, msg) => {
        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
          const out = await res.json(); if(out.status === 'success') { setLastSyncedAt(new Date()); showToast(msg); } else throw new Error(out.message);
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const handleSubmit = (e) => {
        e.preventDefault(); if (isSubmitting) return; setValidationError('');
        const req = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
        const missing = req.filter(f => !formData[f] || String(formData[f]).trim() === '');
        if (missing.length > 0) return setValidationError(`กรุณากรอกให้ครบ: ${missing.join(', ')}`);
        
        setIsSubmitting(true);
        const og = editId ? records.find(r => r.id === editId) : null;
        let hist = parseRemarkHistory(og?.remark);
        if (formData.newRemark?.trim()) hist.push({ version: formData.version || '0', text: formData.newRemark.trim(), date: formatDateToDDMMYY(new Date()), author: formData.inspectorName || 'System' });

        const pData = { ...formData, displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate), displayGeneratedDate: formatDateToDDMMYY(formData.generatedDate), displayVersionDate: formatDateToDDMMYY(formData.versionDate), remark: JSON.stringify(hist) };
        delete pData.newRemark;

        const isUpg = og && (og.version || '0') === '0' && (formData.version || '0') !== '0';
        let target, msg;
        if (editId && !isUpg) { target = { ...pData, id: editId }; setRecords(p => p.map(r => r.id === editId ? target : r)); msg = 'อัปเดตสำเร็จ'; } 
        else { target = { ...pData, id: generateUniqueId() }; setRecords(p => [target, ...p]); msg = isUpg ? `อัปเกรด V${formData.version} สำเร็จ` : 'เพิ่มสำเร็จ'; }
        
        closeModal(); syncDb({ action: 'SAVE', record: target }, msg);
      };

      const handleDelete = (id) => {
        if(window.confirm('ยืนยันลบถาวร?')) { setIsSubmitting(true); setRecords(p => p.filter(r => r.id !== id)); closeModal(); syncDb({ action: 'DELETE', id }, 'ลบสำเร็จ'); }
      };

      const updateInspectorName = (idx, newName) => { const newData = [...inspectorsData]; newData[idx].name = newName; setInspectorsData(newData); };
      const toggleCert = (idx, pl, isChecked) => { const newData = [...inspectorsData]; if (isChecked) newData[idx].certs.push(pl); else newData[idx].certs = newData[idx].certs.filter(c => c !== pl); setInspectorsData(newData); };
      const deleteInspector = (idx) => { if(window.confirm('ลบรายชื่อนี้?')) setInspectorsData(inspectorsData.filter((_, i) => i !== idx)); };
      const addInspector = () => setInspectorsData([...inspectorsData, { name: 'New Inspector', certs: [] }]);

      const Badge = ({ r }) => {
        const s = calculateSLA(r.inspectionDate, r.saisStatus);
        if (s.status === 'none') return <span className="text-gray-400 font-bold">-</span>;
        const colors = { closed: 'text-green-700 bg-green-100 border-green-200', overdue: 'text-red-700 bg-red-100 border-red-300 animate-pulse', warning: 'text-orange-700 bg-orange-100 border-orange-300', pending: 'text-blue-700 bg-blue-100 border-blue-200' };
        return <span className={`flex items-center justify-center gap-1 border px-2 py-1 rounded text-[10px] font-bold shadow-sm ${colors[s.status]}`}>{s.text}</span>;
      };

      const renderDashboard = () => {
        let stats = { passed: 0, passedOil: 0, failed: 0, closeOil: 0, cancelled: 0, overdue: 0 };
        let ver = { v0: 0, v1: 0, v2: 0, v3p: 0 }; let insp = {}; let prod = {};
        filteredDash.forEach(r => {
          if (r.saisStatus === 'Passed with Completed') stats.passed++; else if (r.saisStatus === 'Passed with OIL') stats.passedOil++; else if (r.saisStatus === 'Failed') stats.failed++; else if (r.saisStatus === 'Close OIL') stats.closeOil++; else if (r.saisStatus === 'ยกเลิก') stats.cancelled++;
          if (calculateSLA(r.inspectionDate, r.saisStatus).isOverdue) stats.overdue++;
          const vNum = parseInt(r.version || '0'); if (vNum === 0) ver.v0++; else if (vNum === 1) ver.v1++; else if (vNum === 2) ver.v2++; else ver.v3p++;
          if (r.inspectorName) { if(!insp[r.inspectorName]) insp[r.inspectorName] = {t:0,p:0,f:0,o:0,ov:0}; insp[r.inspectorName].t++; if(r.saisStatus==='Passed with Completed'||r.saisStatus==='Close OIL') insp[r.inspectorName].p++; if(r.saisStatus==='Failed') insp[r.inspectorName].f++; if(r.saisStatus==='Passed with OIL') insp[r.inspectorName].o++; if(calculateSLA(r.inspectionDate, r.saisStatus).isOverdue) insp[r.inspectorName].ov++; }
          if (r.productLine) { if(!prod[r.productLine]) prod[r.productLine] = {t:0,p:0,f:0,o:0}; prod[r.productLine].t++; if(r.saisStatus==='Passed with Completed'||r.saisStatus==='Close OIL') prod[r.productLine].p++; if(r.saisStatus==='Failed') prod[r.productLine].f++; if(r.saisStatus==='Passed with OIL') prod[r.productLine].o++; }
        });
        const active = filteredDash.length - stats.cancelled; const sr = active > 0 ? Math.round(((stats.passed+stats.closeOil)/active)*100) : 0; const fr = active > 0 ? Math.round((stats.failed/active)*100) : 0; const or = active > 0 ? Math.round((stats.overdue/active)*100) : 0;

        return (
          <div className="space-y-4 fade-in">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-4 border-b pb-2"><div className="flex items-center gap-2 font-bold text-sm"><Filter className="w-5 h-5 text-[#E20015]"/> Analytics Engine</div><button onClick={()=>setDashFilters({inspector:'all',product:'all',type:'all',condition:'all',status:'all',version:'all'})} className="text-xs flex gap-1 text-gray-500 hover:text-[#E20015] bg-gray-50 px-2 py-1 rounded font-bold"><RotateCcw className="w-3.5 h-3.5"/> ล้าง</button></div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                {['inspector','product','type','condition','status','version'].map(f => (
                  <select key={f} value={dashFilters[f]} onChange={(e)=>setDashFilters(p=>({...p,[f]:e.target.value}))} className="w-full bg-gray-50 border rounded-lg p-2 text-xs font-bold outline-none focus:ring-1 focus:ring-[#E20015] capitalize"><option value="all">{f} (All)</option>{(f==='inspector'?inspectorsData.map(i=>i.name):f==='product'?PRODUCT_LINES:f==='type'?TYPES:f==='condition'?CONDITIONS:f==='status'?SAIS_STATUSES:['0','1','2','3','4','5']).map(o=><option key={o} value={o}>{o}</option>)}</select>
                ))}
              </div>
            </div>
            {filteredDash.length === 0 ? <div className="bg-white rounded-xl shadow-sm p-10 text-center"><Activity className="w-12 h-12 text-gray-200 mx-auto mb-2 animate-pulse"/><h3 className="font-bold text-gray-500">ไม่พบข้อมูล</h3></div> : (
              <>
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                  <div className="bg-gray-900 p-5 rounded-xl shadow-md text-white flex flex-col justify-center"><h3 className="text-blue-300 text-xs font-bold uppercase mb-1">Health Score</h3><div className="text-4xl font-bold">{sr}% <span className="text-sm font-normal">Success</span></div><div className="w-full bg-white/20 h-1.5 rounded-full mt-3"><div className="bg-green-400 h-1.5 rounded-full" style={{width:`${sr}%`}}></div></div></div>
                  <div className="bg-white border border-red-200 p-5 rounded-xl shadow-sm lg:col-span-3 flex justify-between items-center"><div className="flex gap-3 items-center"><ShieldAlert className="w-8 h-8 text-[#E20015]"/><div><h3 className="font-bold text-sm">Critical Focus</h3><p className="text-xs text-gray-500">ความเสี่ยงสูง</p></div></div><div className="flex gap-4 bg-gray-50 px-4 py-2 rounded-lg"><div className="text-center"><span className="block text-2xl font-black text-[#E20015]">{stats.failed}</span><span className="text-[10px] font-bold text-red-500">Failed</span></div><div className="text-center"><span className="block text-2xl font-black text-red-700">{stats.overdue}</span><span className="text-[10px] font-bold text-red-700">Overdue</span></div></div></div>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
                  <div className="bg-white p-3 rounded-xl border flex flex-col"><span className="text-[10px] font-bold text-gray-500">TOTAL</span><div className="text-xl font-bold">{filteredDash.length}</div></div>
                  <div className="bg-green-50 p-3 rounded-xl border border-green-200 flex flex-col"><span className="text-[10px] font-bold text-green-700">PASSED</span><div className="text-xl font-bold text-green-700">{stats.passed}</div></div>
                  <div className="bg-gray-800 p-3 rounded-xl flex flex-col"><span className="text-[10px] font-bold text-gray-300">CLOSE OIL</span><div className="text-xl font-bold text-white">{stats.closeOil}</div></div>
                  <div className="bg-red-50 p-3 rounded-xl border border-red-200 flex flex-col"><span className="text-[10px] font-bold text-red-700">FAILED</span><div className="text-xl font-bold text-red-700">{stats.failed}</div></div>
                  <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 flex flex-col"><span className="text-[10px] font-bold text-amber-700">TRACKING</span><div className="text-xl font-bold text-amber-700">{stats.passedOil}</div></div>
                  <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 flex flex-col"><span className="text-[10px] font-bold text-blue-700">VER. 0</span><div className="text-xl font-bold text-blue-700">{ver.v0}</div></div>
                </div>
              </>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-2 sm:p-4 md:p-6 pb-24 md:pb-28 relative">
          {toast && <div className="fixed top-4 right-4 z-50 toast-enter"><div className={`flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-bold text-white ${toast.type==='error'?'bg-red-600':'bg-green-600'}`}>{toast.message}</div></div>}
          
          <div className="max-w-[1450px] mx-auto space-y-4">
            <div className="bg-white rounded-xl shadow-sm border-t-4 border-[#E20015] p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center relative">
