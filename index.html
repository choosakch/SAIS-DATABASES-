<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAIS DATABASE 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #E20015; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    /* เพิ่ม Animation เล็กน้อย */
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-[#F4F4F4]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, 
      AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, 
      AlertTriangle, RefreshCw, Cloud, CloudOff, PieChart, BarChart2, 
      CheckSquare, XCircle, AlertOctagon, Users, Package, History, 
      Layers, Filter, RotateCcw, Activity, Tag, Briefcase, TrendingUp, 
      Target, ShieldAlert, Zap, Award, Eye
    } from 'https://esm.sh/lucide-react@0.300.0';

    const INSPECTORS = [
      "Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang",
      "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti",
      "Narong Robrum", "Chakrin Dangwichai"
    ];
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "Close OIL", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [
      { value: 'all', label: 'ทุกเดือนในระบบ' },
      { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' },
      { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' },
      { value: '05', label: 'พฤษภาคม' }, { value: '06', label: 'มิถุนายน' },
      { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' },
      { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' },
      { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }
    ];

    const formatDateToDDMMYY = (dateString) => {
      if (!dateString) return '-';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '-'; 
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = String(date.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    };

    const getMonthOnly = (dateString) => {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '';
      return String(date.getMonth() + 1).padStart(2, '0');
    };

    const formatSyncTime = (dateObj) => {
      if (!dateObj) return '';
      const day = String(dateObj.getDate()).padStart(2, '0');
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const year = String(dateObj.getFullYear()).slice(-2);
      const hours = String(dateObj.getHours()).padStart(2, '0');
      const minutes = String(dateObj.getMinutes()).padStart(2, '0');
      return `${day}/${month}/${year} ${hours}:${minutes}`;
    };

    const calculateSLA = (inspectionDateStr, status) => {
      if (!inspectionDateStr) return { text: '-', status: 'none' };
      if (status === 'Passed with Completed' || status === 'Close OIL' || status === 'ยกเลิก') return { text: 'Closed', status: 'closed' };
      if (status !== 'Failed' && status !== 'Passed with OIL') return { text: '-', status: 'none' };

      const inspectDate = new Date(inspectionDateStr);
      const daysToAdd = status === 'Failed' ? 7 : 28;
      const deadlineDate = new Date(inspectDate);
      deadlineDate.setDate(deadlineDate.getDate() + daysToAdd);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      deadlineDate.setHours(0, 0, 0, 0);

      const diffTime = deadlineDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      const formattedDate = formatDateToDDMMYY(deadlineDate.toISOString().split('T')[0]);

      if (diffDays < 0) return { text: `Overdue ${Math.abs(diffDays)} วัน`, status: 'overdue', isOverdue: true };
      if (diffDays === 0) return { text: `ครบกำหนดวันนี้`, status: 'warning', isOverdue: false };
      return { text: `เหลือ ${diffDays} วัน (${formattedDate})`, status: 'pending', isOverdue: false };
    };

    function App() {
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('pending'); 
      const [filterMonth, setFilterMonth] = useState('07'); 
      const [dashInspector, setDashInspector] = useState('all');
      const [dashProduct, setDashProduct] = useState('all');
      const [dashType, setDashType] = useState('all');
      const [dashCondition, setDashCondition] = useState('all');
      const [dashStatus, setDashStatus] = useState('all');
      const [dashVersion, setDashVersion] = useState('all');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);

      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxL504L7GRKPoOmg5ndgbw3kFWDVVfaqgz7s8ZgoW9FHYzbhdfpebGeCr4cIMj_houm/exec';

      useEffect(() => {
        const fetchRecords = async () => {
          setSyncStatus('syncing');
          try {
            const response = await fetch(GAS_WEB_APP_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            // ตรวจสอบว่ามีข้อมูลกลับมาเป็น Array หรือไม่
            if (Array.isArray(data)) {
                setRecords(data);
                setSyncStatus('idle');
            } else {
                throw new Error('Data format error');
            }
          } catch (error) {
            console.error('Error fetching data:', error);
            setSyncStatus('error');
          }
        };
        fetchRecords();
      }, []);

      useEffect(() => {
        const handleScroll = () => {
          const currentScrollY = window.scrollY;
          if (currentScrollY > lastScrollY && currentScrollY > 50) setIsNavVisible(false);
          else setIsNavVisible(true);
          setLastScrollY(currentScrollY);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      const initialFormState = {
        equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '',
        inspectorName: '', productLine: '', type: '', jobSite: '', unit: '',
        preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '',
        version: '0', versionDate: ''
      };

      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');

      const latestInspectionDate = useMemo(() => {
        if (records.length === 0) return '';
        const sorted = [...records].sort((a, b) => new Date(b.inspectionDate) - new Date(a.inspectionDate));
        return sorted[0]?.inspectionDate || '';
      }, [records]);

      const displayedRecords = useMemo(() => {
        return records.filter(rec => {
          const month = getMonthOnly(rec.inspectionDate);
          if (filterMonth !== 'all' && month !== filterMonth) return false;
          return true;
        });
      }, [records, filterMonth]);

      const filteredDashboardRecords = useMemo(() => {
        return records.filter(rec => {
          const month = getMonthOnly(rec.inspectionDate);
          if (filterMonth !== 'all' && month !== filterMonth) return false;
          if (dashInspector !== 'all' && rec.inspectorName !== dashInspector) return false;
          if (dashProduct !== 'all' && rec.productLine !== dashProduct) return false;
          if (dashType !== 'all' && rec.type !== dashType) return false;
          if (dashCondition !== 'all' && rec.condition !== dashCondition) return false;
          if (dashStatus !== 'all' && rec.saisStatus !== dashStatus) return false;
          if (dashVersion !== 'all' && (rec.version || '0') !== dashVersion) return false;
          return true;
        });
      }, [records, filterMonth, dashInspector, dashProduct, dashType, dashCondition, dashStatus, dashVersion]);

      const resetDeepFilters = () => {
        setDashInspector('all'); setDashProduct('all'); setDashType('all');
        setDashCondition('all'); setDashStatus('all'); setDashVersion('all');
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        setValidationError(''); 
      };

      const openAddModal = () => {
        let defaultDateStr = latestInspectionDate;
        if (!defaultDateStr && filterMonth !== 'all') defaultDateStr = `2026-${filterMonth}-01`;
        setFormData({ ...initialFormState, inspectionDate: defaultDateStr, versionDate: defaultDateStr });
        setEditId(null);
        setValidationError('');
        setIsModalOpen(true);
      };

      const openViewModal = (record) => setViewRecord(record);
      const closeViewModal = () => setViewRecord(null);

      const openEditModal = (record) => {
        setFormData(record);
        setEditId(record.id);
        setValidationError('');
        setIsModalOpen(true);
      };

      const closeModal = () => setIsModalOpen(false);

      const autoSyncToDatabase = async (dataToSync) => {
        setSyncStatus('syncing');
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(dataToSync),
          });
          const result = await response.json();
          if(result.status === 'success') {
            setSyncStatus('success');
            setLastSyncedAt(new Date()); 
          } else {
            throw new Error(result.message);
          }
          setTimeout(() => setSyncStatus('idle'), 2000);
        } catch (error) {
          console.error("Sync Error: ", error);
          setSyncStatus('error');
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setValidationError('');

        const requiredFields = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
        const missingBaseFields = requiredFields.filter(field => !formData[field]);

        if (missingBaseFields.length > 0) {
          setValidationError('กรุณากรอกข้อมูลพื้นฐานให้ครบถ้วน');
          return;
        }

        const processedData = {
          ...formData,
          displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate),
          displayGeneratedDate: formData.generatedDate ? formatDateToDDMMYY(formData.generatedDate) : '-',
          displayVersionDate: formData.versionDate ? formatDateToDDMMYY(formData.versionDate) : '-'
        };

        let updatedRecords = [];
        if (editId) {
          updatedRecords = records.map(rec => rec.id === editId ? { ...processedData, id: editId } : rec);
        } else {
          const newId = records.length > 0 ? Math.max(...records.map(r=>Number(r.id) || 0)) + 1 : 1;
          updatedRecords = [...records, { ...processedData, id: newId }];
        }
        
        setRecords(updatedRecords);
        closeModal();
        autoSyncToDatabase(updatedRecords);
      };

      const handleDelete = (id) => {
        if(window.confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?')) {
          const updatedRecords = records.filter(record => record.id !== id);
          setRecords(updatedRecords);
          autoSyncToDatabase(updatedRecords);
          closeModal(); 
        }
      };

      const isCancelled = formData.saisStatus === 'ยกเลิก';

      const SLABadge = ({ record }) => {
        const sla = calculateSLA(record.inspectionDate, record.saisStatus);
        if (sla.status === 'none') return <span className="text-gray-400">-</span>;
        if (sla.status === 'closed') return <span className="flex items-center justify-center gap-1 text-green-600 bg-green-50 border border-green-200 px-2 py-1 rounded text-xs font-bold"><CheckCircle2 className="w-3 h-3"/> {sla.text}</span>;
        if (sla.status === 'overdue') return <span className="flex items-center justify-center gap-1 text-red-600 bg-red-50 border border-red-300 px-2 py-1 rounded text-xs font-bold animate-pulse"><AlertTriangle className="w-3 h-3"/> {sla.text}</span>;
        if (sla.status === 'warning') return <span className="flex items-center justify-center gap-1 text-orange-600 bg-orange-50 border border-orange-300 px-2 py-1 rounded text-xs font-bold"><AlertCircle className="w-3 h-3"/> {sla.text}</span>;
        return <span className="flex items-center justify-center gap-1 text-blue-600 bg-blue-50 border border-blue-200 px-2 py-1 rounded text-xs font-medium"><Clock className="w-3 h-3"/> {sla.text}</span>;
      };

      const renderDashboard = () => {
        const total = filteredDashboardRecords.length;
        let stats = { passed: 0, passedOil: 0, failed: 0, closeOil: 0, cancelled: 0, overdue: 0 };
        let versionCounts = { v0: 0, v1: 0, v2: 0, v3Plus: 0 };
        let inspectorStats = {};
        let typeStats = {};
        let conditionStats = {};
        let productLineStats = {};

        filteredDashboardRecords.forEach(rec => {
          if (rec.saisStatus === 'Passed with Completed') stats.passed++;
          else if (rec.saisStatus === 'Passed with OIL') stats.passedOil++;
          else if (rec.saisStatus === 'Failed') stats.failed++;
          else if (rec.saisStatus === 'Close OIL') stats.closeOil++;
          else if (rec.saisStatus === 'ยกเลิก') stats.cancelled++;

          const sla = calculateSLA(rec.inspectionDate, rec.saisStatus);
          if (sla.isOverdue) stats.overdue++;

          const vNum = parseInt(rec.version || '0');
          if (vNum === 0) versionCounts.v0++;
          else if (vNum === 1) versionCounts.v1++;
          else if (vNum === 2) versionCounts.v2++;
          else if (vNum >= 3) versionCounts.v3Plus++;

          if (rec.inspectorName) {
            if (!inspectorStats[rec.inspectorName]) inspectorStats[rec.inspectorName] = { total: 0, passed: 0, failed: 0, oil: 0, overdue: 0 };
            inspectorStats[rec.inspectorName].total++;
            if (rec.saisStatus === 'Passed with Completed' || rec.saisStatus === 'Close OIL') inspectorStats[rec.inspectorName].passed++;
            if (rec.saisStatus === 'Failed') inspectorStats[rec.inspectorName].failed++;
            if (rec.saisStatus === 'Passed with OIL') inspectorStats[rec.inspectorName].oil++;
            if (sla.isOverdue) inspectorStats[rec.inspectorName].overdue++;
          }
          if (rec.type) {
            if (!typeStats[rec.type]) typeStats[rec.type] = { total: 0, fail: 0 };
            typeStats[rec.type].total++;
            if (rec.saisStatus === 'Failed') typeStats[rec.type].fail++;
          }
          if (rec.productLine) {
            if (!productLineStats[rec.productLine]) productLineStats[rec.productLine] = { total: 0, passed: 0, fail: 0, oil: 0 };
            productLineStats[rec.productLine].total++;
            if (rec.saisStatus === 'Passed with Completed' || rec.saisStatus === 'Close OIL') productLineStats[rec.productLine].passed++;
            if (rec.saisStatus === 'Failed') productLineStats[rec.productLine].fail++;
            if (rec.saisStatus === 'Passed with OIL') productLineStats[rec.productLine].oil++;
          }
        });

        const activeTotal = total - stats.cancelled;
        const successRate = activeTotal > 0 ? Math.round(((stats.passed + stats.closeOil) / activeTotal) * 100) : 0;
        const overdueRate = activeTotal > 0 ? Math.round((stats.overdue / activeTotal) * 100) : 0;
        const failRate = activeTotal > 0 ? Math.round((stats.failed / activeTotal) * 100) : 0;

        return (
          <div className="space-y-6 fade-in">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-4 pb-2 border-b border-gray-100">
                <div className="flex items-center gap-2 text-gray-800 font-bold text-sm">
                  <Filter className="w-5 h-5 text-[#E20015]" /><span>Deep Analytics Engine</span>
                </div>
                <button onClick={resetDeepFilters} className="text-xs flex items-center gap-1 text-gray-500 hover:text-[#E20015] bg-gray-50 px-2 py-1 rounded font-bold"><RotateCcw className="w-3.5 h-3.5" /> ล้าง</button>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                <select value={dashInspector} onChange={(e) => setDashInspector(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Inspector (All)</option>{INSPECTORS.map(i => <option key={i} value={i}>{i}</option>)}</select>
                <select value={dashProduct} onChange={(e) => setDashProduct(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Product Line (All)</option>{PRODUCT_LINES.map(p => <option key={p} value={p}>{p}</option>)}</select>
                <select value={dashType} onChange={(e) => setDashType(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Job Type (All)</option>{TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select>
                <select value={dashCondition} onChange={(e) => setDashCondition(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Condition (All)</option>{CONDITIONS.map(c => <option key={c} value={c}>{c}</option>)}</select>
                <select value={dashStatus} onChange={(e) => setDashStatus(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Status (All)</option>{SAIS_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                <select value={dashVersion} onChange={(e) => setDashVersion(e.target.value)} className="w-full bg-gray-50 border text-xs font-bold rounded p-2 outline-none focus:ring-1"><option value="all">Version (All)</option><option value="0">V0</option><option value="1">V1</option><option value="2">V2</option><option value="3">V3</option></select>
              </div>
            </div>

            {total === 0 ? (
              <div className="bg-white rounded-xl shadow-sm p-12 text-center border">
                <Activity className="w-16 h-16 text-gray-200 mb-4 mx-auto animate-pulse" />
                <h3 className="text-xl font-bold text-gray-600">ไม่พบข้อมูลตามเงื่อนไข</h3>
              </div>
            ) : (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                  <div className="bg-white p-3 rounded-xl border"><span className="text-gray-500 text-[10px] font-bold">TOTAL</span><div className="text-xl font-bold">{total}</div></div>
                  <div className="bg-green-50 p-3 rounded-xl border border-green-200"><span className="text-green-700 text-[10px] font-bold">PASSED</span><div className="text-xl font-bold text-green-700">{stats.passed}</div></div>
                  <div className="bg-[#222] p-3 rounded-xl text-white"><span className="text-gray-300 text-[10px] font-bold">CLOSE OIL</span><div className="text-xl font-bold">{stats.closeOil}</div></div>
                  <div className="bg-red-50 p-3 rounded-xl border border-red-200"><span className="text-red-700 text-[10px] font-bold">FAILED</span><div className="text-xl font-bold text-red-700">{stats.failed}</div></div>
                  <div className="bg-amber-50 p-3 rounded-xl border border-amber-200"><span className="text-amber-700 text-[10px] font-bold">TRACKING OIL</span><div className="text-xl font-bold text-amber-700">{stats.passedOil}</div></div>
                  <div className="bg-blue-50 p-3 rounded-xl border border-blue-200"><span className="text-blue-700 text-[10px] font-bold">VER. 0</span><div className="text-xl font-bold text-blue-700">{versionCounts.v0}</div></div>
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-2 sm:p-4 md:p-6 font-sans text-gray-800 pb-24 md:pb-28">
          <div className="max-w-[1450px] mx-auto space-y-4">
            
            <div className="bg-white rounded-xl shadow-md border-t-8 border-[#E20015] p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center relative">
              <div className="absolute top-2 right-2 flex items-center bg-white/90 rounded px-2 py-1 z-10">
                {syncStatus === 'syncing' && <span className="flex items-center gap-1 text-blue-500 text-[10px] font-bold"><RefreshCw className="w-3 h-3 animate-spin" /> โหลด...</span>}
                {syncStatus === 'success' && <span className="flex items-center gap-1 text-green-600 text-[10px] font-bold"><Cloud className="w-3 h-3" /> ออนไลน์</span>}
                {syncStatus === 'error' && <span className="flex items-center gap-1 text-red-500 text-[10px] font-bold"><AlertTriangle className="w-3 h-3" /> ล้มเหลว</span>}
              </div>

              <div className="flex items-center gap-3 w-full">
                <div className="bg-[#E20015] p-2.5 rounded-lg text-white shadow-sm hidden sm:block"><Building2 className="w-6 h-6" /></div>
                <div>
                  <h1 className="text-lg sm:text-2xl font-bold text-gray-900 leading-none">SAIS <span className="text-[#E20015]">DATABASE</span> 2026</h1>
                  <div className="flex items-center gap-2 mt-2">
                    <span className="text-xs text-gray-500 font-medium">เดือน:</span>
                    <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="bg-gray-50 border border-gray-200 text-xs font-bold rounded p-1 outline-none">
                      {MONTHS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                    </select>
                  </div>
                </div>
              </div>
            </div>

            {activeTab === 'dashboard' ? renderDashboard() : (
              <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 fade-in">
                <div className="p-3 sm:p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                  <h3 className="font-bold text-gray-900 text-sm">{activeTab === 'pending' ? 'รายการ PENDING' : 'รายการ TRACKING OIL'} <span className="bg-[#222] text-white text-[10px] px-2 rounded-full ml-1">{displayedRecords.length}</span></h3>
                  <button onClick={openAddModal} className="flex items-center gap-1 bg-[#E20015] text-white px-4 py-2 rounded-lg font-bold text-xs"><Plus className="w-4 h-4" /> เพิ่ม</button>
                </div>
                
                <div className="overflow-x-auto w-full max-h-[60vh]">
                  <table className="w-full text-sm text-left whitespace-nowrap">
                    <thead className="text-[10px] sm:text-xs text-gray-600 uppercase bg-gray-100 sticky top-0 z-10">
                      <tr>
                        <th className="px-3 py-3 border-r text-center font-bold">No.</th>
                        <th className="px-4 py-3 border-r font-bold">Eq No.</th>
                        <th className="px-4 py-3 border-r font-bold">Insp Date</th>
                        {activeTab === 'pending' && <th className="px-4 py-3 border-r font-bold text-gray-400">Gen Date</th>}
                        {activeTab === 'pending' && <th className="px-3 py-3 border-r font-bold text-gray-400">Gen Sys</th>}
                        <th className="px-4 py-3 border-r font-bold">Inspector</th>
                        <th className="px-3 py-3 border-r text-center font-bold">Product</th>
                        <th className="px-3 py-3 border-r text-center font-bold">Type</th>
                        <th className="px-4 py-3 border-r font-bold">Job Site</th>
                        <th className="px-3 py-3 border-r text-center font-bold">Unit</th>
                        <th className="px-4 py-3 border-r text-center font-bold">Condition</th>
                        {activeTab === 'pending' && <th className="px-3 py-3 border-r text-center font-bold text-gray-400">Pre-Check</th>}
                        {activeTab === 'pending' && <th className="px-3 py-3 border-r text-center font-bold text-gray-400">Buzzer</th>}
                        {activeTab === 'oil' && <th className="px-4 py-3 border-r text-center font-bold">Version</th>}
                        {activeTab === 'oil' && <th className="px-4 py-3 border-r text-center font-bold">Ver Date</th>}
                        {activeTab === 'oil' && <th className="px-4 py-3 border-r text-center font-bold bg-amber-50">SLA</th>}
                        <th className="px-4 py-3 border-r font-bold">Remark</th>
                        <th className="px-4 py-3 border-r text-center font-bold">Status</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {displayedRecords.length === 0 ? (
                        <tr><td colSpan="20" className="text-center py-10 text-gray-400 text-sm">ไม่พบข้อมูล</td></tr>
                      ) : (
                        displayedRecords.map((record, idx) => (
                          <tr key={record.id} onClick={() => openViewModal(record)} className="bg-white hover:bg-blue-50 cursor-pointer">
                            <td className="px-3 py-2 border-r text-center">{idx + 1}</td>
                            <td className="px-4 py-2 border-r font-bold text-[#E20015]">{record.equipmentNo}</td>
                            <td className="px-4 py-2 border-r text-gray-600">{record.displayInspectionDate}</td>
                            {activeTab === 'pending' && <td className="px-4 py-2 border-r text-gray-400 italic">{record.displayGeneratedDate}</td>}
                            {activeTab === 'pending' && <td className="px-3 py-2 border-r text-center text-gray-400 italic">{record.generatedInSystem || '-'}</td>}
                            <td className="px-4 py-2 border-r text-gray-800">{record.inspectorName}</td>
                            <td className="px-3 py-2 border-r text-center">{record.productLine}</td>
                            <td className="px-3 py-2 border-r text-center">{record.type}</td>
                            <td className="px-4 py-2 border-r truncate max-w-[150px]">{record.jobSite}</td>
                            <td className="px-3 py-2 border-r text-center">{record.unit}</td>
                            <td className="px-4 py-2 border-r text-center">{record.condition || '-'}</td>
                            {activeTab === 'pending' && <td className="px-3 py-2 border-r text-center text-gray-400 italic">{record.preCheck || '-'}</td>}
                            {activeTab === 'pending' && <td className="px-3 py-2 border-r text-center text-gray-400 italic">{record.buzzer || '-'}</td>}
                            {activeTab === 'oil' && <td className="px-4 py-2 border-r text-center font-bold bg-gray-50">V{record.version || '0'}</td>}
                            {activeTab === 'oil' && <td className="px-4 py-2 border-r text-center text-xs bg-gray-50">{record.displayVersionDate || '-'}</td>}
                            {activeTab === 'oil' && <td className="px-4 py-2 border-r text-center bg-amber-50/20"><SLABadge record={record} /></td>}
                            <td className="px-4 py-2 border-r text-gray-600 truncate max-w-[150px]">{record.remark || '-'}</td>
                            <td className="px-4 py-2 border-r text-center">
                              <span className={`px-2 py-1 rounded text-[10px] font-bold ${record.saisStatus === 'Passed with Completed' ? 'bg-green-100 text-green-700' : record.saisStatus === 'Close OIL' ? 'bg-green-600 text-white' : record.saisStatus === 'Failed' ? 'bg-red-100 text-red-700' : record.saisStatus === 'Passed with OIL' ? 'bg-amber-100 text-amber-700' : record.saisStatus === 'ยกเลิก' ? 'bg-gray-800 text-white' : 'bg-blue-100 text-blue-700'}`}>{record.saisStatus || 'PENDING'}</span>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40 pb-safe">
            <div className="flex justify-around p-2">
              <button onClick={() => setActiveTab('pending')} className={`flex flex-col items-center p-2 rounded-lg ${activeTab === 'pending' ? 'text-[#E20015]' : 'text-gray-500'}`}><FileSpreadsheet className="w-5 h-5" /><span className="text-[10px]">PENDING</span></button>
              <button onClick={() => setActiveTab('oil')} className={`flex flex-col items-center p-2 rounded-lg ${activeTab === 'oil' ? 'text-[#E20015]' : 'text-gray-500'}`}><ClipboardList className="w-5 h-5" /><span className="text-[10px]">TRACKING</span></button>
              <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 rounded-lg ${activeTab === 'dashboard' ? 'text-[#E20015]' : 'text-gray-500'}`}><BarChart2 className="w-5 h-5" /><span className="text-[10px]">DASHBOARD</span></button>
            </div>
          </div>

          {/* Form แบบเต็ม */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
              <div className="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-5 fade-in">
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                  <h2 className="text-lg font-bold">{editId ? 'อัปเดตข้อมูล' : 'เพิ่มรายการตรวจสอบใหม่'}</h2>
                  <button onClick={closeModal}><X className="w-5 h-5 text-gray-500 hover:text-gray-800"/></button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Equipment No.</label><input type="number" name="equipmentNo" value={formData.equipmentNo} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none focus:border-[#E20015]" /></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Inspection Date</label><input type="date" name="inspectionDate" value={formData.inspectionDate} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none focus:border-[#E20015]" /></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Inspector</label><select name="inspectorName" value={formData.inspectorName} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none"><option value="">-- เลือก --</option>{INSPECTORS.map(i => <option key={i} value={i}>{i}</option>)}</select></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Product Line</label><select name="productLine" value={formData.productLine} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none"><option value="">-- เลือก --</option>{PRODUCT_LINES.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Type</label><select name="type" value={formData.type} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none"><option value="">-- เลือก --</option>{TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Job Site</label><input type="text" name="jobSite" value={formData.jobSite} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none" /></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Unit</label><input type="text" name="unit" value={formData.unit} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none" /></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">SAIS Status</label><select name="saisStatus" value={formData.saisStatus} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none font-bold text-blue-700"><option value="">-- สถานะ --</option>{SAIS_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                  
                  {activeTab === 'oil' && (
                    <>
                      <div><label className="text-xs font-bold text-amber-600 uppercase">Version</label><select name="version" value={formData.version || '0'} onChange={handleInputChange} className="w-full border border-amber-300 bg-amber-50 p-2 rounded text-sm outline-none"><option value="0">V0</option><option value="1">V1</option><option value="2">V2</option><option value="3">V3</option><option value="4">V4</option><option value="5">V5</option></select></div>
                      <div><label className="text-xs font-bold text-amber-600 uppercase">Version Date</label><input type="date" name="versionDate" value={formData.versionDate || ''} onChange={handleInputChange} className="w-full border border-amber-300 bg-amber-50 p-2 rounded text-sm outline-none" /></div>
                    </>
                  )}
                  
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Condition</label><select name="condition" value={formData.condition} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none"><option value="">-- เงื่อนไข --</option>{CONDITIONS.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div><label className="text-xs font-bold text-gray-700 uppercase">Generated Date</label><input type="date" name="generatedDate" value={formData.generatedDate} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none" /></div>
                  <div className="grid grid-cols-3 gap-2">
                    <div><label className="text-[10px] font-bold text-gray-500 uppercase">Gen Sys</label><select name="generatedInSystem" value={formData.generatedInSystem} onChange={handleInputChange} className="w-full border p-2 rounded text-xs outline-none"><option value="">-</option><option value="YES">YES</option></select></div>
                    <div><label className="text-[10px] font-bold text-gray-500 uppercase">Pre-Check</label><select name="preCheck" value={formData.preCheck} onChange={handleInputChange} className="w-full border p-2 rounded text-xs outline-none"><option value="">-</option><option value="OK">OK</option></select></div>
                    <div><label className="text-[10px] font-bold text-gray-500 uppercase">Buzzer</label><select name="buzzer" value={formData.buzzer} onChange={handleInputChange} className="w-full border p-2 rounded text-xs outline-none"><option value="">-</option><option value="YES">YES</option><option value="N/A">N/A</option></select></div>
                  </div>
                  <div className="md:col-span-2"><label className="text-xs font-bold text-gray-700 uppercase">Remark</label><input type="text" name="remark" value={formData.remark} onChange={handleInputChange} className="w-full border p-2 rounded text-sm outline-none" /></div>
                </div>

                {validationError && <div className="text-red-500 text-xs mt-3 p-2 bg-red-50 border border-red-200 rounded">{validationError}</div>}
                
                <div className="flex justify-between mt-6 pt-4 border-t">
                  {editId ? <button onClick={() => handleDelete(editId)} className="px-4 py-2 bg-red-50 text-red-600 rounded text-sm font-bold border border-red-200">ลบ</button> : <div></div>}
                  <div className="flex gap-2">
                    <button onClick={closeModal} className="px-4 py-2 bg-gray-200 rounded text-sm font-bold">ยกเลิก</button>
                    <button onClick={handleSubmit} className="px-4 py-2 bg-[#E20015] text-white rounded text-sm font-bold shadow-md">บันทึก</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* View Detail แบบเต็ม */}
          {viewRecord && (
             <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
              <div className="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 fade-in">
                <div className="border-b pb-3 flex justify-between items-center mb-4">
                  <h3 className="font-bold text-lg flex items-center gap-2"><Eye className="w-5 h-5 text-blue-600"/> รายละเอียดข้อมูล</h3>
                  <button onClick={closeViewModal}><X className="w-5 h-5 text-gray-500 hover:text-gray-800"/></button>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-3 gap-y-4 gap-x-2">
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Equipment No.</span><span className="text-base font-bold text-[#E20015]">{viewRecord.equipmentNo}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Insp Date</span><span className="text-sm font-semibold">{viewRecord.displayInspectionDate}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Inspector</span><span className="text-sm font-semibold">{viewRecord.inspectorName}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Product</span><span className="text-sm font-semibold">{viewRecord.productLine}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Type</span><span className="text-sm font-semibold">{viewRecord.type}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Unit</span><span className="text-sm font-semibold">{viewRecord.unit}</span></div>
                  <div className="col-span-2 md:col-span-3"><span className="text-[10px] text-gray-400 font-bold uppercase block">Job Site</span><span className="text-sm font-semibold">{viewRecord.jobSite}</span></div>
                  
                  <div className="col-span-2 md:col-span-3 border-t pt-4 my-2"></div>
                  
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-1">Status</span><span className="px-2 py-1 rounded text-xs font-bold bg-blue-100 text-blue-700">{viewRecord.saisStatus || 'PENDING'}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Version</span><span className="text-sm font-bold">V{viewRecord.version || '0'}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Version Date</span><span className="text-sm font-semibold">{viewRecord.displayVersionDate || '-'}</span></div>
                  
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Condition</span><span className="text-sm font-semibold">{viewRecord.condition || '-'}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Gen Date</span><span className="text-sm font-semibold">{viewRecord.displayGeneratedDate}</span></div>
                  <div><span className="text-[10px] text-gray-400 font-bold uppercase block">Gen Sys</span><span className="text-sm font-semibold">{viewRecord.generatedInSystem || '-'}</span></div>
                  
                  <div className="col-span-2 md:col-span-3"><span className="text-[10px] text-gray-400 font-bold uppercase block">Remark</span><div className="text-sm bg-gray-50 p-2 rounded border min-h-[40px]">{viewRecord.remark || '-'}</div></div>
                </div>

                <div className="flex gap-2 justify-end mt-6 pt-4 border-t">
                  <button onClick={closeViewModal} className="px-5 py-2 bg-gray-200 rounded text-sm font-bold">ปิด</button>
                  <button onClick={() => { closeViewModal(); openEditModal(viewRecord); }} className="px-5 py-2 bg-blue-600 text-white rounded text-sm font-bold shadow-md flex items-center gap-1"><Edit className="w-4 h-4"/> แก้ไข</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
