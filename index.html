<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard and Pending System</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Export Libraries -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #E20015; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    .slide-up { animation: slideUp 0.3s ease-out forwards; }
    .toast-enter { animation: toastEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }

    .sticky-header th { position: sticky; top: 0; z-index: 10; background-color: #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .svg-chart text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    .resize-container::-webkit-scrollbar { display: none; }
    .resize-container { -ms-overflow-style: none; scrollbar-width: none; }
    .resizing { user-select: none; cursor: col-resize; }
    
    /* Interactive Chart elements */
    .chart-interactive { transition: all 0.2s ease; cursor: pointer; }
    .chart-interactive:hover { filter: brightness(1.1); transform: scale(1.02); }
    .chart-bar:hover { opacity: 0.85; filter: brightness(1.1); cursor: pointer; }
    .chart-tooltip { position: fixed; pointer-events: none; z-index: 100; transition: all 0.1s ease; }
    
    /* Clickable Cards */
    .clickable-card { transition: all 0.2s ease; cursor: pointer; }
    .clickable-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
    .clickable-card-red:hover { border-color: #ef4444; }
    
    th select { pointer-events: auto; }
  </style>
</head>
<body class="bg-[#F4F4F4] text-gray-800 antialiased overflow-x-hidden overscroll-y-contain font-sans">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useCallback, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, ChevronLeft, AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, AlertTriangle, RefreshCw, Cloud, CloudOff, BarChart2, Filter, RotateCcw, Activity, ShieldAlert, Target, Award, Package, Eye, MessageSquare, Search, History, Settings, TrendingUp, PieChart, Users, Columns, HelpCircle, Info, LayoutDashboard, FileText, BookOpen, Check, Download, Calendar, MousePointerClick, Zap } from 'https://esm.sh/lucide-react@0.300.0';

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw6qVBH1vCdNVOXMwirdfR9AVQoBmsmF3hKBytnl-wrkk1oaRWBEzPwqo1QmOV9Owua/exec';
    
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [{ value: 'all', label: 'ทุกเดือน' }, { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' }, { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' }, { value: '05', label: 'พฤษภาคม' }, { value: '06', label: 'มิถุนายน' }, { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' }, { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' }, { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }];
    const DEFAULT_INSPECTORS = ["Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang", "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti", "Narong Robrum", "Chakrin Dangwichai"];
    const STANDARD_UNITS = ["L1", "L2", "PL1", "PL2", "SL1"];
    
    const DEFAULT_WIDTHS = {
      no: 40, inspDate: 100, eqNo: 110, genDate: 100, sys: 100, insp: 130,
      prod: 80, type: 80, site: 150, unit: 70, cond: 110, pre: 80, buz: 70, remark: 150, status: 110
    };

    const COLUMNS_DEF = [
      { id: 'no', label: 'No.' }, { id: 'inspDate', label: 'Inspection Date' }, { id: 'eqNo', label: 'Equipment No.' },
      { id: 'genDate', label: 'Generated Date' }, { id: 'sys', label: 'Generated In System' }, { id: 'insp', label: 'Inspector Name' },
      { id: 'prod', label: 'Product Line' }, { id: 'type', label: 'Type' }, { id: 'site', label: 'Job Site' },
      { id: 'unit', label: 'Unit' }, { id: 'cond', label: 'Condition' }, { id: 'pre', label: 'Pre Check' },
      { id: 'buz', label: 'Buzzer' }, { id: 'remark', label: 'Remark' }, { id: 'status', label: 'SAIS Status' }
    ];

    // ฟังก์ชันจัดลำดับ Inspector ตามที่ต้องการ
    const getInspectorSortIndex = (name) => {
        if(!name) return 99;
        const n = name.toLowerCase();
        if(n.includes("thongchai")) return 1;
        if(n.includes("prayod")) return 2;
        if(n.includes("choosak")) return 3;
        if(n.includes("pradit")) return 4;
        if(n.includes("teeratat")) return 5;
        if(n.includes("narong")) return 6;
        if(n.includes("matee")) return 7;
        if(n.includes("chakrin")) return 8;
        return 99;
    };

    const formatDateToDDMMYY = (d) => { if (!d) return '-'; const date = new Date(d); return isNaN(date.getTime()) ? '-' : `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getFullYear()).slice(-2)}`; };
    const formatDateForInput = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; };
    const getMonthOnly = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : String(date.getMonth() + 1).padStart(2, '0'); };
    const getYearOnly = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : String(date.getFullYear()); };
    const formatSyncTime = (d) => d ? `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}` : '';
    const generateUniqueId = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
    const parseRemarkHistory = (str) => { try { const p = JSON.parse(str); return Array.isArray(p) ? p : [{ text: str, date: '-', author: 'System' }]; } catch(e) { return str ? [{ text: str, date: '-', author: 'System' }] : []; } };

    function App() {
      const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
      const currentYearStr = String(new Date().getFullYear());
      
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [filterMonth, setFilterMonth] = useState(currentMonthStr);
      const [searchTerm, setSearchTerm] = useState('');
      const [tableFilters, setTableFilters] = useState({ inspDate: '', eqNo: '', genDate: '', sys: '', insp: '', prod: '', type: '', site: '', unit: '', cond: '', pre: '', buz: '', status: '' });

      const [dashYear, setDashYear] = useState(currentYearStr);
      const [dashPeriod, setDashPeriod] = useState('all'); 

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 30; 
      const [toast, setToast] = useState(null);
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [inspectorsData, setInspectorsData] = useState(() => DEFAULT_INSPECTORS.map(name => ({ name, certs: [...PRODUCT_LINES] })));

      const [isColMenuOpen, setIsColMenuOpen] = useState(false);
      const [hiddenCols, setHiddenCols] = useState(() => {
         try { const saved = localStorage.getItem('sais_hidden_cols'); return saved ? new Set(JSON.parse(saved)) : new Set(); } catch(e) { return new Set(); }
      });
      useEffect(() => { localStorage.setItem('sais_hidden_cols', JSON.stringify([...hiddenCols])); }, [hiddenCols]);

      const [colWidths, setColWidths] = useState(() => {
         try { const saved = localStorage.getItem('sais_col_widths'); return saved ? JSON.parse(saved) : DEFAULT_WIDTHS; } catch(e) { return DEFAULT_WIDTHS; }
      });
      useEffect(() => { localStorage.setItem('sais_col_widths', JSON.stringify(colWidths)); }, [colWidths]);

      const [resizing, setResizing] = useState(null);
      const dashboardRef = useRef(null); 
      const [tooltip, setTooltip] = useState({ show: false, x: 0, y: 0, content: '' });

      const startResize = (e, colId) => {
         e.preventDefault(); e.stopPropagation(); 
         setResizing({ id: colId, startX: e.clientX, startWidth: colWidths[colId] || DEFAULT_WIDTHS[colId] });
      };

      useEffect(() => {
         const handleMouseMove = (e) => {
            if (!resizing) return;
            const diff = e.clientX - resizing.startX;
            const newWidth = Math.max(40, resizing.startWidth + diff); 
            setColWidths(prev => ({ ...prev, [resizing.id]: newWidth }));
         };
         const handleMouseUp = () => { setResizing(null); };
         if (resizing) { window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp); document.body.classList.add('resizing');
         } else { document.body.classList.remove('resizing'); }
         return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); document.body.classList.remove('resizing'); };
      }, [resizing]);

      const [isHelpOpen, setIsHelpOpen] = useState(false);
      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const closeViewModal = () => setViewRecord(null);

      const initialFormState = { equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '', inspectorName: '', productLine: '', type: '', jobSite: '', unit: '', preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '', newRemark: '' };
      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');
      const [missingFields, setMissingFields] = useState([]);

      const fetchRecords = useCallback(async (isSilent = false) => {
        if (!isSilent) setSyncStatus('syncing');
        try {
          const res = await fetch(GAS_WEB_APP_URL); if (!res.ok) throw new Error('Net Error');
          const data = await res.json();
          if (data && data.records && Array.isArray(data.records)) {
             setRecords(data.records.filter(i => i.id && i.id.toString().trim() !== ''));
             if (data.inspectors && Array.isArray(data.inspectors) && data.inspectors.length > 0) {
                 const parsedInspectors = data.inspectors.map(i => {
                     let parsedCerts = []; try { parsedCerts = JSON.parse(i.certs); } catch(e) {}
                     return { name: i.name, certs: Array.isArray(parsedCerts) ? parsedCerts : [] };
                 });
                 setInspectorsData(parsedInspectors);
             }
             setSyncStatus('success'); setLastSyncedAt(new Date());
          } 
          else if (Array.isArray(data)) { setRecords(data.filter(i => i.id && i.id.toString().trim() !== '')); setSyncStatus('success'); setLastSyncedAt(new Date()); }
          else { setRecords([]); setSyncStatus('idle'); }
        } catch (e) { setSyncStatus('error'); if (!isSilent) showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error'); }
      }, []);

      useEffect(() => { fetchRecords(); }, [fetchRecords]);

      const availableYears = useMemo(() => {
         const years = new Set([currentYearStr]);
         records.forEach(r => { const y = getYearOnly(r.inspectionDate); if (y) years.add(y); });
         return [...years].sort().reverse();
      }, [records, currentYearStr]);

      useEffect(() => {
        const handleScroll = () => { setIsNavVisible(window.scrollY < lastScrollY || window.scrollY < 50); setLastScrollY(window.scrollY); };
        window.addEventListener('scroll', handleScroll, { passive: true }); return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      useEffect(() => { setCurrentPage(1); }, [activeTab, filterMonth, searchTerm, tableFilters]);

      const latestInspectionDate = useMemo(() => { const sorted = [...records].sort((a, b) => new Date(b.inspectionDate || 0) - new Date(a.inspectionDate || 0)); return sorted[0]?.inspectionDate || ''; }, [records]);

      const uniqueTableOptions = useMemo(() => {
         const opts = { inspDate: new Set(), eqNo: new Set(), genDate: new Set(), sys: new Set(), insp: new Set(), prod: new Set(), type: new Set(), site: new Set(), unit: new Set(), cond: new Set(), pre: new Set(), buz: new Set(), status: new Set() };
         records.forEach(r => {
            if(r.inspectionDate) { const d = formatDateToDDMMYY(r.inspectionDate); if(d !== '-') opts.inspDate.add(d); }
            if(r.equipmentNo != null) opts.eqNo.add(String(r.equipmentNo).trim());
            if(r.generatedDate) { const d = formatDateToDDMMYY(r.generatedDate); if(d !== '-') opts.genDate.add(d); }
            if(r.jobSite != null && String(r.jobSite).trim() !== '') opts.site.add(String(r.jobSite).trim());
            if(r.generatedInSystem != null && String(r.generatedInSystem).trim() !== '') opts.sys.add(String(r.generatedInSystem).trim());
            if(r.inspectorName != null && String(r.inspectorName).trim() !== '') opts.insp.add(String(r.inspectorName).trim());
            if(r.productLine != null && String(r.productLine).trim() !== '') opts.prod.add(String(r.productLine).trim());
            if(r.type != null && String(r.type).trim() !== '') opts.type.add(String(r.type).trim());
            if(r.unit != null && String(r.unit).trim() !== '') opts.unit.add(String(r.unit).trim());
            if(r.condition != null && String(r.condition).trim() !== '') opts.cond.add(String(r.condition).trim());
            if(r.preCheck != null && String(r.preCheck).trim() !== '') opts.pre.add(String(r.preCheck).trim());
            if(r.buzzer != null && String(r.buzzer).trim() !== '') opts.buz.add(String(r.buzzer).trim());
            if(r.saisStatus != null && String(r.saisStatus).trim() !== '') opts.status.add(String(r.saisStatus).trim());
         });
         return {
            inspDate: [...opts.inspDate].sort(), eqNo: [...opts.eqNo].sort(), genDate: [...opts.genDate].sort(), site: [...opts.site].sort(),
            sys: [...opts.sys].sort(), insp: [...opts.insp].sort(), prod: [...opts.prod].sort(), type: [...opts.type].sort(),
            unit: [...opts.unit].sort(), cond: [...opts.cond].sort(), pre: [...opts.pre].sort(), buz: [...opts.buz].sort(), status: [...opts.status].sort()
         };
      }, [records]);

      const displayedRecords = useMemo(() => {
        return records.filter(rec => {
          if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
          if (searchTerm) { const s = searchTerm.toLowerCase(); if (!String(rec.equipmentNo||'').toLowerCase().includes(s) && !String(rec.jobSite||'').toLowerCase().includes(s)) return false; }
          
          if (tableFilters.inspDate && formatDateToDDMMYY(rec.inspectionDate) !== tableFilters.inspDate) return false;
          if (tableFilters.eqNo && String(rec.equipmentNo||'').trim() !== tableFilters.eqNo) return false;
          if (tableFilters.genDate && formatDateToDDMMYY(rec.generatedDate) !== tableFilters.genDate) return false;
          if (tableFilters.site && String(rec.jobSite||'').trim() !== tableFilters.site) return false;
          if (tableFilters.sys && String(rec.generatedInSystem||'').trim() !== tableFilters.sys) return false;
          if (tableFilters.insp && String(rec.inspectorName||'').trim() !== tableFilters.insp) return false;
          if (tableFilters.prod && String(rec.productLine||'').trim() !== tableFilters.prod) return false;
          if (tableFilters.type && String(rec.type||'').trim() !== tableFilters.type) return false;
          if (tableFilters.unit && String(rec.unit||'').trim() !== tableFilters.unit) return false;
          
          // Logic 3: Condition Deep-Dive (รองรับ BLANK_COND สำหรับงานที่ไม่ระบุ Condition)
          if (tableFilters.cond) {
              if (tableFilters.cond === 'BLANK_COND') {
                  if (String(rec.condition||'').trim() !== '') return false;
              } else if (String(rec.condition||'').trim() !== tableFilters.cond) {
                  return false;
              }
          }

          if (tableFilters.pre && String(rec.preCheck||'').trim() !== tableFilters.pre) return false;
          if (tableFilters.buz && String(rec.buzzer||'').trim() !== tableFilters.buz) return false;
          
          // Logic 2: FPY Status Filter (รองรับการกรอง Passed Completed + Passed OIL)
          if (tableFilters.status) {
              if (tableFilters.status === 'FPY') {
                  if (rec.saisStatus !== 'Passed with Completed' && rec.saisStatus !== 'Passed with OIL') return false;
              } else if (String(rec.saisStatus||'').trim() !== tableFilters.status) {
                  return false;
              }
          }
          
          return true;
        }).sort((a, b) => {
           const dA = new Date(a.inspectionDate || 0).getTime(); const dB = new Date(b.inspectionDate || 0).getTime();
           if (!isNaN(dA) && !isNaN(dB)) { if (dA !== dB) return dA - dB; } return parseInt(a.id || 0) - parseInt(b.id || 0);
        });
      }, [records, filterMonth, searchTerm, tableFilters]);

      const totalPages = Math.ceil(displayedRecords.length / ITEMS_PER_PAGE);
      const paginatedRecords = useMemo(() => displayedRecords.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE), [displayedRecords, currentPage]);
      const processedPaginatedRecords = useMemo(() => {
        let currentBgIsGray = false; let lastProcessedDate = null;
        return paginatedRecords.map((r, i) => {
          const rDate = formatDateToDDMMYY(r.inspectionDate); let showDate = false;
          if (rDate !== lastProcessedDate) { showDate = true; if (i > 0) currentBgIsGray = !currentBgIsGray; lastProcessedDate = rDate; }
          return { ...r, displayDateFormatted: rDate, showDate: showDate, bgClass: currentBgIsGray ? 'bg-gray-100' : 'bg-white' };
        });
      }, [paginatedRecords]);

      const handleInput = (e) => { 
        setFormData(p => ({ ...p, [e.target.name]: e.target.value })); 
        setValidationError(''); 
        if (missingFields.includes(e.target.name)) setMissingFields(p => p.filter(f => f !== e.target.name));
      };

      const handleTableFilter = (e) => { 
          const { name, value } = e.target; 
          setTableFilters(prev => ({ ...prev, [name]: value })); 
      };
      
      const hasTableFilters = Object.values(tableFilters).some(v => v !== '');
      const clearTableFilters = () => setTableFilters({ inspDate: '', eqNo: '', genDate: '', site: '', sys: '', insp: '', prod: '', type: '', unit: '', cond: '', pre: '', buz: '', status: '' });
      
      const toggleColumn = (colId) => {
        const newHidden = new Set(hiddenCols);
        if (newHidden.has(colId)) newHidden.delete(colId); else newHidden.add(colId);
        setHiddenCols(newHidden); 
      };
      const clearHiddenCols = () => setHiddenCols(new Set());
      const resetColWidths = () => setColWidths(DEFAULT_WIDTHS);

      const openAddModal = () => { 
        setFormData({ ...initialFormState, inspectionDate: formatDateForInput(latestInspectionDate) || (filterMonth !== 'all' ? `${dashYear}-${filterMonth}-01` : '') }); 
        setEditId(null); setValidationError(''); setMissingFields([]); setIsModalOpen(true); 
      };
      const closeModal = () => setIsModalOpen(false);
      const openViewModal = (r) => setViewRecord(r);
      const openEditModal = (r) => { 
        setFormData({ ...r, inspectionDate: formatDateForInput(r.inspectionDate), generatedDate: formatDateForInput(r.generatedDate), newRemark: '' }); 
        setEditId(r.id); setValidationError(''); setMissingFields([]); setIsModalOpen(true); 
      };

      const syncDb = async (payload, msg) => {
        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
          const text = await res.text(); let out;
          try { out = JSON.parse(text); } catch(e) { throw new Error("Invalid Server Response"); }
          if(out.status === 'success') { setLastSyncedAt(new Date()); showToast(msg); } else throw new Error(out.message || "Unknown Error");
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const saveSettingsOnline = async () => {
         setIsSubmitting(true);
         try {
            const payload = { action: 'SAVE_SETTINGS', inspectors: inspectorsData };
            const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
            const text = await res.text(); let out;
            try { out = JSON.parse(text); } catch(e) { throw new Error("Invalid Server Response"); }
            if(out.status === 'success') { showToast('บันทึกตั้งค่าขึ้นสู่ระบบออนไลน์สำเร็จ', 'success'); setIsSettingsOpen(false); } 
            else { throw new Error(out.message || "Unknown Error"); }
         } catch(err) { showToast(`Error: ${err.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const handleSubmit = async (e) => {
        e.preventDefault(); if (isSubmitting) return; 
        setValidationError(''); setMissingFields([]);

        try {
            const req = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
            const missing = req.filter(f => !formData[f] || String(formData[f]).trim() === '');
            
            if (missing.length > 0) {
                setMissingFields(missing); return setValidationError(`กรุณากรอกข้อมูลสำคัญให้ครบถ้วน: ${missing.join(', ')}`);
            }

            const eqString = String(formData.equipmentNo).trim(); const eqRegex = /^\d+$/;
            if (!eqRegex.test(eqString)) {
                setMissingFields(['equipmentNo']); return setValidationError('รูปแบบ Eq No. ไม่ถูกต้อง (ต้องเป็นตัวเลขเท่านั้น)');
            }
            if (formData.generatedDate && formData.inspectionDate) {
              const genDate = new Date(formData.generatedDate); const inspDate = new Date(formData.inspectionDate);
              genDate.setHours(0,0,0,0); inspDate.setHours(0,0,0,0);
              if (genDate < inspDate) return setValidationError('วันที่ Gen Date ต้องไม่ก่อนวันที่ Inspection Date');
            }
            
            setIsSubmitting(true);
            const og = editId ? records.find(r => String(r.id) === String(editId)) : null;
            let hist = parseRemarkHistory(og?.remark);
            if (formData.newRemark && String(formData.newRemark).trim()) { hist.push({ text: String(formData.newRemark).trim(), date: formatDateToDDMMYY(new Date()), author: formData.inspectorName || 'System' }); }
            
            const pData = { ...formData, equipmentNo: eqString, displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate), displayGeneratedDate: formatDateToDDMMYY(formData.generatedDate), remark: JSON.stringify(hist) };
            delete pData.newRemark;
            let target, msg;
            
            if (editId) { 
                target = { ...pData, id: editId }; 
                setRecords(p => p.map(r => String(r.id) === String(editId) ? target : r)); 
                msg = 'อัปเดตสำเร็จ'; 
            } else { 
                target = { ...pData, id: generateUniqueId() }; 
                setRecords(p => [target, ...p]); 
                msg = 'เพิ่มสำเร็จ'; 
            }
            closeModal(); await syncDb({ action: 'SAVE', record: target }, msg);
        } catch (err) { setValidationError(`ระบบขัดข้อง: ${err.message}`); setIsSubmitting(false); }
      };

      const handleDelete = (id) => { if(window.confirm('ยืนยันลบถาวร?')) { setIsSubmitting(true); setRecords(p => p.filter(r => String(r.id) !== String(id))); closeModal(); syncDb({ action: 'DELETE', id }, 'ลบสำเร็จ'); } };

      const updateInspectorName = (idx, newName) => { const newData = [...inspectorsData]; newData[idx].name = newName; setInspectorsData(newData); };
      const toggleCert = (idx, pl) => { const newData = [...inspectorsData]; if (newData[idx].certs.includes(pl)) newData[idx].certs = newData[idx].certs.filter(c => c !== pl); else newData[idx].certs.push(pl); setInspectorsData(newData); };
      const deleteInspector = (idx) => { if(window.confirm('ลบรายชื่อนี้?')) setInspectorsData(inspectorsData.filter((_, i) => i !== idx)); };
      const addInspector = () => setInspectorsData([...inspectorsData, { name: 'New Inspector', certs: [] }]);
      const selectAllCerts = (idx) => { const newData = [...inspectorsData]; newData[idx].certs = [...PRODUCT_LINES]; setInspectorsData(newData); };
      const clearAllCerts = (idx) => { const newData = [...inspectorsData]; newData[idx].certs = []; setInspectorsData(newData); };

      // ================= DRILL-DOWN LOGIC ================= //
      const handleDrillDown = (filters) => {
         clearTableFilters();
         setSearchTerm('');
         
         // นำ Filter ที่กดส่งเข้าตาราง
         setTableFilters(prev => ({ ...prev, ...filters }));
         
         // ปรับเดือนให้ตรงกับที่ดูใน Dashboard
         if (dashPeriod !== 'all' && !dashPeriod.startsWith('Q')) {
             setFilterMonth(dashPeriod); // ถ้าเจาะจงเดือน ให้ PENDING เป็นเดือนนั้น
         } else {
             setFilterMonth('all'); // ถ้าเป็น Q1-Q4 หรือ ทั้งปี ให้แสดงทั้งหมดแล้วใช้ tableFilters คัดกรอง
         }
         
         setActiveTab('records');
         window.scrollTo(0,0);
      };

      const showTooltip = (e, content) => { setTooltip({ show: true, x: e.clientX, y: e.clientY, content }); };
      const hideTooltip = () => setTooltip({ show: false, x: 0, y: 0, content: '' });

      // ================= DASHBOARD USEMEMO (Extreme Detail Analytics) ================= //
      const dashboardData = useMemo(() => {
         const activeRecords = records.filter(r => {
             if (r.saisStatus === 'ยกเลิก') return false; 
             if (dashYear !== 'all' && getYearOnly(r.inspectionDate) !== dashYear) return false;
             
             if (dashPeriod !== 'all') {
                const month = getMonthOnly(r.inspectionDate);
                if (dashPeriod === 'Q1' && !['01','02','03'].includes(month)) return false;
                if (dashPeriod === 'Q2' && !['04','05','06'].includes(month)) return false;
                if (dashPeriod === 'Q3' && !['07','08','09'].includes(month)) return false;
                if (dashPeriod === 'Q4' && !['10','11','12'].includes(month)) return false;
                if (!dashPeriod.startsWith('Q') && month !== dashPeriod) return false;
             }
             return true; 
         });

         let stats = { total: 0, comp: 0, oil: 0, failed: 0, pending: 0 };
         let productStats = {};
         let inspectorStats = {};
         let buzzerStats = { YES: 0, NO: 0 }; 
         let preCheckStats = { OK: 0, NO: 0 };
         
         let typeStats = {};
         
         // Logic 3: ตัวแปรสำหรับการวิเคราะห์ Condition ที่ไม่ใช่ Final
         let nonFinalTotal = 0;
         let condStats = {};

         activeRecords.forEach(r => {
            stats.total++;
            const status = r.saisStatus || '';
            
            if (status === 'Passed with Completed') stats.comp++;
            else if (status === 'Passed with OIL') stats.oil++;
            else if (status === 'Failed') stats.failed++;
            else stats.pending++; 

            if (status === '' || status === 'PENDING') return; 

            // Readiness
            if (r.preCheck === 'OK') preCheckStats.OK++;
            if (r.preCheck === 'NO') preCheckStats.NO++;
            if (r.buzzer === 'YES') buzzerStats.YES++;
            if (r.buzzer === 'NO') buzzerStats.NO++;

            // Products
            if(r.productLine) {
               if(!productStats[r.productLine]) productStats[r.productLine] = { total: 0, comp: 0, oil: 0, failed: 0 };
               productStats[r.productLine].total++;
               if(status === 'Passed with Completed') productStats[r.productLine].comp++;
               if(status === 'Passed with OIL') productStats[r.productLine].oil++;
               if(status === 'Failed') productStats[r.productLine].failed++;
            }

            // Inspectors
            if (r.inspectorName) {
               if(!inspectorStats[r.inspectorName]) inspectorStats[r.inspectorName] = { total: 0, fpy: 0 };
               inspectorStats[r.inspectorName].total++;
               if(status === 'Passed with Completed' || status === 'Passed with OIL') inspectorStats[r.inspectorName].fpy++;
            }

            // Deep Dive: Type (NI vs MOD)
            if (r.type) {
               if(!typeStats[r.type]) typeStats[r.type] = { total: 0, fail: 0 };
               typeStats[r.type].total++;
               if(status === 'Failed') typeStats[r.type].fail++;
            }

            // Deep Dive: Condition (Count Not Final Only)
            const conditionVal = String(r.condition || '').trim();
            if (conditionVal !== 'Final') {
               nonFinalTotal++;
               const condKey = conditionVal === '' ? 'ไม่มีระบุ (Blank)' : conditionVal;
               if(!condStats[condKey]) condStats[condKey] = { total: 0 };
               condStats[condKey].total++;
            }
         });

         const fpyRate = stats.total - stats.pending > 0 ? Math.round(((stats.comp + stats.oil) / (stats.total - stats.pending)) * 100) : 0;
         const failRate = stats.total - stats.pending > 0 ? Math.round((stats.failed / (stats.total - stats.pending)) * 100) : 0;
         
         const barData = Object.entries(productStats).map(([name, data]) => ({ name, ...data })).sort((a,b) => b.total - a.total).slice(0, 8);
         const maxBar = Math.max(...barData.map(d => d.total), 1);
         
         // Logic 1: จัดเรียง Leaderboard ตามคิว Thongchai, Prayod, Choosak ...
         const leaderboardData = Object.entries(inspectorStats)
            .map(([name, data]) => ({ name, ...data }))
            .sort((a,b) => getInspectorSortIndex(a.name) - getInspectorSortIndex(b.name));
         
         const typeData = Object.entries(typeStats).map(([name, data]) => ({
             name, total: data.total, fail: data.fail, 
             failRate: data.total > 0 ? Math.round((data.fail/data.total)*100) : 0
         })).sort((a,b) => b.total - a.total);

         // Logic 3: ประมวลผล Data ของงานที่ไม่ใช่ Final
         const condData = Object.entries(condStats).map(([name, data]) => ({
             name, total: data.total
         })).sort((a,b) => b.total - a.total);

         return { stats, barData, maxBar, leaderboardData, buzzerStats, preCheckStats, fpyRate, failRate, typeData, condData, nonFinalTotal, activeCount: activeRecords.length };
      }, [records, dashYear, dashPeriod]);

      // PDF / Excel Export Functions
      const exportToExcel = () => {
         const wsData = displayedRecords.map(r => ({
             "No": r.equipmentNo,
             "Insp Date": formatDateToDDMMYY(r.inspectionDate),
             "System Date": formatDateToDDMMYY(r.generatedDate),
             "Inspector": r.inspectorName,
             "Product Line": r.productLine,
             "Type": r.type,
             "Job Site": r.jobSite,
             "Unit": r.unit,
             "Status": r.saisStatus,
             "Condition": r.condition,
             "Pre-Check": r.preCheck,
             "Buzzer": r.buzzer,
             "Remark": r.remark ? parseRemarkHistory(r.remark).pop()?.text || '' : ''
         }));
         const ws = XLSX.utils.json_to_sheet(wsData);
         const wb = XLSX.utils.book_new();
         XLSX.utils.book_append_sheet(wb, ws, "Records");
         XLSX.writeFile(wb, `SAIS_Report_${dashYear}_${dashPeriod}.xlsx`);
      };

      const exportToPDF = () => {
         const element = dashboardRef.current;
         const opt = {
           margin: 0.2,
           filename: `Dashboard_SAIS_${dashYear}_${dashPeriod}.pdf`,
           image: { type: 'jpeg', quality: 0.98 },
           html2canvas: { scale: 2, useCORS: true },
           jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
         };
         html2pdf().set(opt).from(element).save();
      };

      const renderDashboard = () => {
        const { stats, barData, maxBar, leaderboardData, buzzerStats, preCheckStats, fpyRate, failRate, typeData, condData, nonFinalTotal } = dashboardData;
        
        const statusRawData = [ 
           { label: 'Completed', filterVal: 'Passed with Completed', value: stats.comp, color: '#10b981' }, 
           { label: 'Passed (OIL)', filterVal: 'Passed with OIL', value: stats.oil, color: '#f59e0b' },
           { label: 'Failed', filterVal: 'Failed', value: stats.failed, color: '#ef4444' }
        ].filter(d => d.value > 0);
        
        if (stats.pending > 0) statusRawData.push({ label: 'Pending', filterVal: '', value: stats.pending, color: '#9ca3af' });
        
        const totalStatus = stats.total;
        let accPercent = 0;
        const donutSegments = statusRawData.map(d => {
           const percent = totalStatus > 0 ? (d.value / totalStatus) * 100 : 0; const dashArray = `${percent} ${100 - percent}`; const dashOffset = 25 - accPercent; accPercent += percent; return { ...d, percent, dashArray, dashOffset };
        });

        return (
          <div className="space-y-4 fade-in pb-10" ref={dashboardRef}>
            {/* Toolbar สำหรับ Dashboard */}
            <div className="bg-white border rounded-xl p-3 flex flex-col sm:flex-row justify-between items-center gap-3 shadow-sm" data-html2canvas-ignore>
               <div className="flex items-center gap-3 w-full sm:w-auto">
                 <div className="flex items-center gap-1.5 bg-gray-100 p-1.5 rounded-lg border">
                    <Calendar className="w-4 h-4 text-gray-500" />
                    <select value={dashYear} onChange={e=>setDashYear(e.target.value)} className="bg-transparent text-xs font-bold outline-none cursor-pointer text-gray-700">
                       <option value="all">ทุกปี</option>
                       {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                 </div>
                 <div className="flex items-center gap-1.5 bg-gray-100 p-1.5 rounded-lg border">
                    <Filter className="w-4 h-4 text-gray-500" />
                    <select value={dashPeriod} onChange={e=>setDashPeriod(e.target.value)} className="bg-transparent text-xs font-bold outline-none cursor-pointer text-gray-700">
                       <option value="all">ทั้งปี (All)</option>
                       <option value="Q1">ไตรมาส 1 (ม.ค. - มี.ค.)</option>
                       <option value="Q2">ไตรมาส 2 (เม.ย. - มิ.ย.)</option>
                       <option value="Q3">ไตรมาส 3 (ก.ค. - ก.ย.)</option>
                       <option value="Q4">ไตรมาส 4 (ต.ค. - ธ.ค.)</option>
                       {MONTHS.slice(1).map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                    </select>
                 </div>
               </div>
               
               <div className="flex gap-2 w-full sm:w-auto">
                 <button onClick={exportToExcel} className="flex-1 sm:flex-none flex justify-center items-center gap-1 bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-100 transition"><FileSpreadsheet className="w-4 h-4"/> Excel</button>
                 <button onClick={exportToPDF} className="flex-1 sm:flex-none flex justify-center items-center gap-1 bg-red-50 text-red-700 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-100 transition"><Download className="w-4 h-4"/> PDF</button>
               </div>
            </div>

            {stats.total === 0 ? <div className="bg-white rounded-xl shadow-sm p-10 text-center border"><Activity className="w-12 h-12 text-gray-200 mx-auto mb-2 animate-pulse"/><h3 className="font-bold text-gray-500">ไม่พบข้อมูลในปี/รอบเดือน ที่เลือก</h3></div> : (
              <>
                {/* 3 Main Highlight Cards (Clickable Drill-down) */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div onClick={() => handleDrillDown({})} className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center relative overflow-hidden group clickable-card" title="คลิกเพื่อดูงานทั้งหมด">
                     <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform"><Package className="w-24 h-24 text-gray-500" /></div>
                     <div className="flex justify-between items-start mb-1">
                        <span className="text-[10px] font-bold text-gray-600 uppercase">Total Inspected</span>
                        <MousePointerClick className="w-3 h-3 text-gray-300 group-hover:text-blue-500 transition-colors" />
                     </div>
                     <div className="text-3xl font-black text-gray-800">{stats.total} <span className="text-sm text-gray-400">งาน</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">จำนวนงานเข้าตรวจทั้งหมด (รวมรอผล)</span>
                  </div>
                  {/* Logic 2: FPY Drill-down (Pass+OIL) */}
                  <div onClick={() => { handleDrillDown({ status: 'FPY' }); showToast('แสดงเฉพาะ Passed (Completed) + Passed (OIL)', 'success'); }} className="bg-white p-5 rounded-xl border border-blue-200 shadow-sm flex flex-col justify-center relative overflow-hidden group clickable-card" title="คลิกเพื่อดูกลุ่มงานที่ตรวจผ่าน">
                     <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform"><Target className="w-24 h-24 text-blue-500" /></div>
                     <div className="flex justify-between items-start mb-1">
                        <span className="text-[10px] font-bold text-blue-600 uppercase">First Pass Yield</span>
                        <MousePointerClick className="w-3 h-3 text-blue-300 group-hover:text-blue-500 transition-colors" />
                     </div>
                     <div className="text-3xl font-black text-gray-800">{fpyRate}%</div>
                     <span className="text-[10px] text-gray-500 mt-1">อัตราตรวจผ่านสำเร็จ (Completed + OIL)</span>
                  </div>
                  <div onClick={() => handleDrillDown({ status: 'Failed' })} className="bg-white p-5 rounded-xl border border-red-200 shadow-sm flex flex-col justify-center relative overflow-hidden group clickable-card clickable-card-red" title="คลิกเพื่อดูกลุ่มงาน Failed">
                     <div className="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform"><ShieldAlert className="w-24 h-24 text-red-500" /></div>
                     <div className="flex justify-between items-start mb-1">
                        <span className="text-[10px] font-bold text-red-600 uppercase">Failed Defects</span>
                        <MousePointerClick className="w-3 h-3 text-red-300 group-hover:text-red-500 transition-colors" />
                     </div>
                     <div className="text-3xl font-black text-gray-800 flex items-end gap-2">{stats.failed} <span className="text-xs text-red-400 mb-1 font-bold">({failRate}%)</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">ต้องแก้ไข (คลิกเพื่อดูรายชื่อไซต์งาน)</span>
                  </div>
                </div>

                {/* Level 2: Core Charts */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                   {/* Donut Chart (Interactive) */}
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col relative group">
                      <h3 className="text-sm font-bold text-gray-700 flex items-center justify-between mb-4">
                          <span className="flex items-center gap-2"><PieChart className="w-4 h-4 text-blue-500"/> สัดส่วนผลการตรวจ</span>
                          <MousePointerClick className="w-4 h-4 text-gray-300 group-hover:text-blue-500 transition-colors" title="คลิกที่ส่วนของกราฟเพื่อเจาะลึกข้อมูล" />
                      </h3>
                      <div className="flex flex-1 items-center justify-center gap-6">
                         {totalStatus === 0 ? <span className="text-gray-400 text-xs font-bold">ไม่มีข้อมูล</span> : (
                           <>
                              <div className="w-32 h-32 relative svg-chart">
                                <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                                   {donutSegments.map((s, i) => (
                                     <circle key={i} cx="18" cy="18" r="15.9155" fill="transparent" stroke={s.color} strokeWidth="4" strokeDasharray={s.dashArray} strokeDashoffset={s.dashOffset} 
                                      onMouseMove={(e)=>showTooltip(e, `คลิกเพื่อดู: ${s.label} (${s.value} งาน)`)} onMouseLeave={hideTooltip} onClick={() => s.filterVal && handleDrillDown({ status: s.filterVal })} className="chart-interactive" />
                                   ))}
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                   <span className="text-2xl font-black text-gray-800 leading-none">{totalStatus}</span>
                                   <span className="text-[10px] font-bold text-gray-400">TOTAL</span>
                                </div>
                              </div>
                              <div className="space-y-2 text-xs">
                                 {donutSegments.map((s, i) => (
                                    <div key={i} onClick={() => s.filterVal && handleDrillDown({ status: s.filterVal })} className={`flex items-center gap-2 p-1 -ml-1 rounded transition-colors ${s.filterVal ? 'cursor-pointer hover:bg-gray-50' : 'cursor-default'}`}>
                                       <div className="w-3 h-3 rounded-sm shrink-0" style={{backgroundColor: s.color}}></div>
                                       <span className="font-bold text-gray-700 w-24 truncate">{s.label}</span>
                                       <span className="text-gray-500 font-medium">{Math.round(s.percent)}% <span className="text-[10px]">({s.value})</span></span>
                                    </div>
                                 ))}
                              </div>
                           </>
                         )}
                      </div>
                      <div className="text-[9px] text-gray-400 text-center mt-2">*คลิกที่สีบนกราฟหรือข้อความเพื่อ Filter ข้อมูลบนตาราง</div>
                   </div>

                   {/* Bar Chart (Product Lines - Interactive) */}
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col relative group">
                      <h3 className="text-sm font-bold text-gray-700 flex items-center justify-between mb-4">
                        <span className="flex items-center gap-2"><BarChart2 className="w-4 h-4 text-indigo-500"/> ผลงานตามรุ่น Product Line</span>
                        <MousePointerClick className="w-4 h-4 text-gray-300 group-hover:text-blue-500 transition-colors" title="คลิกที่แท่งกราฟเพื่อดูเฉพาะรุ่นนั้น" />
                      </h3>
                      <div className="flex-1 w-full h-40 svg-chart relative">
                         {barData.length === 0 ? <div className="absolute inset-0 flex justify-center items-center text-xs font-bold text-gray-400">ไม่มีข้อมูล</div> : (
                           <svg viewBox="0 0 400 160" className="w-full h-full preserve-3d">
                              {barData.map((d, i) => {
                                  const barWidth = 360 / barData.length - 8;
                                  const x = i * (barWidth + 8) + 20;
                                  const renderTotal = d.comp + d.oil + d.failed;
                                  if(renderTotal === 0) return null; 

                                  const compH = (d.comp / maxBar) * 120;
                                  const oilH = (d.oil / maxBar) * 120;
                                  const failH = (d.failed / maxBar) * 120;
                                  
                                  const failY = 140 - failH;
                                  const oilY = failY - oilH;
                                  const compY = oilY - compH;

                                  return (
                                     <g key={i} onClick={() => handleDrillDown({ prod: d.name })} className="chart-interactive" onMouseMove={(e)=>showTooltip(e, `คลิกดูรุ่น ${d.name} | รวม: ${renderTotal} (Fail: ${d.failed})`)} onMouseLeave={hideTooltip}>
                                        <rect x={x-2} y={20} width={barWidth+4} height={120} fill="transparent" /> 
                                        {d.failed > 0 && <rect x={x} y={failY} width={barWidth} height={failH} fill="#ef4444" />}
                                        {d.oil > 0 && <rect x={x} y={oilY} width={barWidth} height={oilH} fill="#f59e0b" />}
                                        {d.comp > 0 && <rect x={x} y={compY} width={barWidth} height={compH} fill="#10b981" rx={compH === 120 ? "2" : "0"} />}
                                        
                                        <text x={x + barWidth/2} y={155} fontSize="9" textAnchor="middle" fill="#6b7280" className="uppercase font-bold">{d.name.substring(0,6)}</text>
                                        <text x={x + barWidth/2} y={compY - 5} fontSize="10" textAnchor="middle" fill="#4b5563" fontWeight="bold">{renderTotal}</text>
                                     </g>
                                  )
                              })}
                           </svg>
                         )}
                      </div>
                      <div className="flex justify-center gap-3 mt-2 text-[10px] font-bold text-gray-500">
                         <div className="flex items-center gap-1"><span className="w-2 h-2 bg-emerald-500 rounded-sm"></span> Comp.</div>
                         <div className="flex items-center gap-1"><span className="w-2 h-2 bg-amber-500 rounded-sm"></span> OIL</div>
                         <div className="flex items-center gap-1"><span className="w-2 h-2 bg-red-500 rounded-sm"></span> Failed</div>
                      </div>
                   </div>
                </div>

                {/* Level 3: Analytics Deep Dive & Readiness */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                   
                   {/* Risk Analysis: Type & Condition */}
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col lg:col-span-2">

                                    </div>
                                 </div>

                          </div>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {PRODUCT_LINES.map(pl => {
                            const isChecked = insp.certs.includes(pl);
                            return (
                              <button key={pl} onClick={() => toggleCert(idx, pl)} className={`flex items-center gap-1.5 text-[10px] px-2.5 py-1.5 rounded-md border cursor-pointer select-none transition-all ${isChecked ? 'bg-blue-600 border-blue-600 text-white font-bold shadow-sm' : 'bg-white text-gray-500 hover:bg-gray-100 hover:border-gray-300'}`}>
                                {isChecked && <CheckCircle2 className="w-3 h-3" />}
                                {pl}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  ))}
                  <button onClick={addInspector} className="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold flex items-center justify-center gap-2 hover:bg-gray-50 hover:text-[#E20015] hover:border-[#E20015] transition-all">
                    <Plus className="w-5 h-5" /> เพิ่มรายชื่อ Inspector
                  </button>
                </div>
                <div className="bg-gray-50 p-4 border-t flex justify-end shrink-0">
                  <button onClick={saveSettingsOnline} disabled={isSubmitting} className="px-6 py-2.5 bg-[#E20015] text-white rounded-lg font-bold flex items-center gap-2 disabled:bg-red-300 shadow-sm active:scale-95 transition-all">
                    {isSubmitting ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Cloud className="w-4 h-4" />} บันทึกการตั้งค่าขึ้นระบบคลาวด์
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Form Modal (บันทึกข้อมูล) */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center sm:p-4">
              <div className="bg-white w-full sm:rounded-xl sm:max-w-3xl max-h-[95vh] flex flex-col slide-up">
                <div className="bg-gray-50 p-3 border-b flex justify-between items-center rounded-t-xl">
                  <h2 className="font-black text-sm">{editId ? 'อัปเดตข้อมูล' : 'เพิ่มข้อมูลใหม่'}</h2>
                  <button onClick={closeModal}><X className="w-4 h-4 text-gray-500" /></button>
                </div>
                <div className="p-4 overflow-y-auto custom-scrollbar text-xs">
                  {validationError && (
                    <div className="mb-3 p-3 bg-red-50 text-red-700 rounded-lg flex items-center gap-2 font-bold border border-red-200">
                      <AlertCircle className="w-4 h-4 shrink-0" /> <span className="flex-1">{validationError}</span>
                    </div>
                  )}
                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Eq No. *</label>
                      <input type="text" name="equipmentNo" value={formData.equipmentNo} onChange={handleInput} 
                        className={`w-full border rounded p-2 focus:ring-1 outline-none font-black text-black transition-colors ${missingFields.includes('equipmentNo') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`} />
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Date *</label>
                      <input type="date" name="inspectionDate" value={formData.inspectionDate} onChange={handleInput} 
                        className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors ${missingFields.includes('inspectionDate') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`} />
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Inspector *</label>
                      <select name="inspectorName" value={formData.inspectorName} onChange={handleInput} 
                        className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors ${missingFields.includes('inspectorName') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`}>
                        <option value="">-- เลือก --</option>
                        {inspectorsData.map(o => <option key={o.name} value={o.name}>{o.name}</option>)}
                      </select>
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Product *</label>
                      {(() => { 
                        const selInsp = inspectorsData.find(i => i.name === formData.inspectorName); 
                        const availablePLs = selInsp ? selInsp.certs : PRODUCT_LINES;
                        return (
                          <select name="productLine" value={formData.productLine} onChange={handleInput} 
                            className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors ${missingFields.includes('productLine') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`}>
                            <option value="">-- เลือก --</option>
                            {availablePLs.map(o => <option key={o} value={o}>{o}</option>)}
                          </select>
                        );
                      })()}
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Type *</label>
                      <select name="type" value={formData.type} onChange={handleInput} 
                        className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors 
                          ${missingFields.includes('type') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : 
                            formData.type === 'NI CNX' ? 'text-green-600 font-bold bg-green-50 border-green-200' : 
                            formData.type === 'NI HKT' ? 'text-pink-600 font-bold bg-pink-50 border-pink-200' : ''}`}>
                        <option value="" className="text-gray-800 bg-white">-- เลือก --</option>
                        {TYPES.map(o => <option key={o} value={o} className={o === 'NI CNX' ? 'text-green-600 font-bold bg-white' : o === 'NI HKT' ? 'text-pink-600 font-bold bg-white' : 'text-gray-800 bg-white'}>{o}</option>)}
                      </select>
                    </div>
                    <div className="space-y-1 col-span-2">
                      <label className="font-bold text-gray-500 uppercase">Site *</label>
                      <input type="text" name="jobSite" value={formData.jobSite} onChange={handleInput} 
                        className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors ${missingFields.includes('jobSite') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`} />
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Unit *</label>
                      <div className="flex flex-col gap-1">
                         <select 
                            value={STANDARD_UNITS.includes(formData.unit) ? formData.unit : (formData.unit ? 'OTHER' : '')} 
                            onChange={(e) => {
                               if(e.target.value === 'OTHER') { handleInput({ target: { name: 'unit', value: ' ' } }); } 
                               else { handleInput({ target: { name: 'unit', value: e.target.value } }); }
                            }}
                            className={`w-full border rounded p-2 focus:ring-1 outline-none transition-colors ${missingFields.includes('unit') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : ''}`}
                         >
                            <option value="">-- เลือก --</option>
                            {STANDARD_UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                            <option value="OTHER">อื่นๆ (พิมพ์เอง)</option>
                         </select>
                         {(!STANDARD_UNITS.includes(formData.unit) && formData.unit !== '') && (
                            <input type="text" name="unit" value={formData.unit.trim()} onChange={handleInput} placeholder="พิมพ์ Unit ที่นี่..." 
                              className={`w-full border rounded p-2 focus:ring-1 outline-none fade-in bg-blue-50 transition-colors ${missingFields.includes('unit') ? 'border-red-500 bg-red-50 ring-2 ring-red-200 animate-shake' : 'border-blue-300'}`} />
                         )}
                      </div>
                    </div>
                    <div className="col-span-2 lg:col-span-4 border-t my-1"></div>
                    <div className="space-y-1 col-span-2 lg:col-span-1">
                      <label className="font-bold text-blue-700 uppercase">Status</label>
                      <select name="saisStatus" value={formData.saisStatus} onChange={handleInput} className="w-full border border-blue-300 bg-blue-50 rounded p-2 font-bold text-blue-800 outline-none">
                        <option value="">-- PENDING --</option>
                        {SAIS_STATUSES.map(o => <option key={o} value={o}>{o}</option>)}
                      </select>
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Condition</label>
                      <select name="condition" value={formData.condition} onChange={handleInput} 
                        className={`w-full border rounded p-2 outline-none transition-colors 
                          ${formData.condition === 'TEMPORARY POWER SUPPLY' ? 'text-yellow-600 font-bold bg-yellow-50 border-yellow-200' : 
                            formData.condition === 'BUILDER LIFT' ? 'text-orange-600 font-bold bg-orange-50 border-orange-200' : 
                            'bg-white border-gray-300 text-gray-800'}`}>
                        <option value="" className="text-gray-800 bg-white">-- เลือก --</option>
                        {CONDITIONS.map(o => <option key={o} value={o} className={o === 'TEMPORARY POWER SUPPLY' ? 'text-yellow-600 font-bold bg-white' : o === 'BUILDER LIFT' ? 'text-orange-600 font-bold bg-white' : 'text-gray-800 bg-white'}>{o}</option>)}
                      </select>
                    </div>
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Gen Date</label>
                      <input type="date" name="generatedDate" value={formData.generatedDate} onChange={handleInput} className="w-full border rounded p-2 outline-none" />
                    </div>
                    <div className="grid grid-cols-3 gap-1 col-span-2 lg:col-span-1">
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Gen Sys</label>
                        <select name="generatedInSystem" value={formData.generatedInSystem} onChange={handleInput} className="w-full border rounded p-1.5 outline-none"><option value="">-</option><option value="YES">YES</option></select>
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Pre</label>
                        <select name="preCheck" value={formData.preCheck} onChange={handleInput} 
                          className={`w-full border rounded p-1.5 outline-none transition-colors 
                            ${formData.preCheck === 'NO' ? 'text-red-600 font-bold bg-red-50 border-red-200' : 'bg-white border-gray-300 text-gray-800'}`}>
                          <option value="" className="text-gray-800 bg-white">-</option>
                          <option value="OK" className="text-gray-800 bg-white">OK</option>
                          <option value="NO" className="text-red-600 font-bold bg-white">NO</option>
                        </select>
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Buz</label>
                        <select name="buzzer" value={formData.buzzer} onChange={handleInput} 
                          className={`w-full border rounded p-1.5 outline-none transition-colors 
                            ${formData.buzzer === 'NO' ? 'text-red-600 font-bold bg-red-50 border-red-200' : 'bg-white border-gray-300 text-gray-800'}`}>
                          <option value="" className="text-gray-800 bg-white">-</option>
                          <option value="YES" className="text-gray-800 bg-white">YES</option>
                          <option value="NO" className="text-red-600 font-bold bg-white">NO</option>
                          <option value="N/A" className="text-gray-800 bg-white">N/A</option>
                        </select>
                      </div>
                    </div>
                    <div className="col-span-2 lg:col-span-4 bg-gray-50 p-2 rounded border">
                      <label className="font-bold text-gray-800 flex gap-1 mb-2"><MessageSquare className="w-3 h-3" /> ประวัติคอมเมนต์</label>
                      <div className="space-y-1 mb-2 max-h-24 overflow-y-auto">
                        {(() => { 
                          const h = parseRemarkHistory(formData.remark); 
                          if (!h.length || !h[0].text) return <div className="text-gray-400 py-1 text-center">ไม่มีคอมเมนต์</div>; 
                          return h.map((x, i) => (
                            <div key={i} className="bg-white p-1.5 rounded border mb-1">
                              <div className="flex justify-between mb-0.5"><span className="text-[8px] text-gray-400">{x.date}</span><span className="text-[8px] font-bold text-gray-600">{x.author}</span></div>
                              <p className="text-[10px]">{x.text}</p>
                            </div>
                          ));
                        })()}
                      </div>
                      <input type="text" name="newRemark" value={formData.newRemark || ''} onChange={handleInput} className="w-full border rounded p-2 outline-none focus:border-[#E20015]" placeholder="เพิ่มคอมเมนต์ใหม่..." />
                    </div>
                  </div>
                </div>
                <div className="bg-gray-50 p-3 border-t flex justify-between shrink-0">
                  {editId ? <button onClick={() => handleDelete(editId)} disabled={isSubmitting} className="px-3 py-1.5 rounded font-bold text-red-600 bg-white border flex gap-1 disabled:opacity-50"><Trash2 className="w-3.5 h-3.5" /> ลบ</button> : <div></div>}
                  <div className="flex gap-2">
                    <button onClick={closeModal} className="px-3 py-1.5 rounded font-bold bg-white border">ยกเลิก</button>
                    <button onClick={handleSubmit} disabled={isSubmitting} className="px-4 py-1.5 rounded font-bold bg-[#E20015] text-white flex gap-1 disabled:bg-red-300 shadow-sm">{isSubmitting ? <RefreshCw className="w-3.5 h-3.5 animate-spin" /> : <Save className="w-3.5 h-3.5" />} บันทึก</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* View Record Modal */}
          {viewRecord && (
            <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center sm:p-4">
              <div className="bg-white w-full sm:rounded-xl sm:max-w-2xl max-h-[90vh] flex flex-col slide-up">
                <div className="bg-gray-50 p-3 border-b flex justify-between items-center rounded-t-xl">
                  <div className="flex items-center gap-1.5 font-black text-sm"><Eye className="w-4 h-4 text-blue-600" /> รายละเอียด</div>
                  <button onClick={closeViewModal}><X className="w-4 h-4 text-gray-500" /></button>
                </div>
                <div className="p-4 overflow-y-auto custom-scrollbar text-xs">
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div><span className="text-[9px] text-gray-400 font-bold block">Insp. Date</span><span className="font-bold">{formatDateToDDMMYY(viewRecord.inspectionDate)}</span></div>
                    <div><span className="text-[9px] text-gray-400 font-bold block">Eq. No.</span><span className="text-base font-black text-black">{viewRecord.equipmentNo}</span></div>
                    <div><span className="text-[9px] text-gray-400 font-bold block">Inspector</span><span className="font-bold">{viewRecord.inspectorName}</span></div>
                    <div><span className="text-[9px] text-gray-400 font-bold block">Product</span><span className="bg-gray-100 px-2 py-0.5 rounded font-bold">{viewRecord.productLine}</span></div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Type</span>
                      <span className={`px-2 py-0.5 rounded font-bold ${viewRecord.type === 'NI CNX' ? 'bg-green-50 text-green-600' : viewRecord.type === 'NI HKT' ? 'bg-pink-50 text-pink-600' : 'bg-gray-100'}`}>
                         {viewRecord.type}
                      </span>
                    </div>
                    <div><span className="text-[9px] text-gray-400 font-bold block">Unit</span><span className="font-bold">{viewRecord.unit}</span></div>
                    <div className="col-span-2 md:col-span-3"><span className="text-[9px] text-gray-400 font-bold block">Job Site</span><span className="bg-gray-50 p-2 rounded block font-bold border">{viewRecord.jobSite}</span></div>
                  </div>
                  <div className="border-t border-dashed my-3"></div>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block mb-1">Status</span>
                      <span className={`px-2 py-0.5 rounded text-[10px] font-bold border ${viewRecord.saisStatus === 'Passed with Completed' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : viewRecord.saisStatus === 'Failed' ? 'bg-red-100 text-red-700 border-red-200' : viewRecord.saisStatus === 'Passed with OIL' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-blue-50 text-blue-700'}`}>{viewRecord.saisStatus || 'PENDING'}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block mb-1">Condition</span>
                      <span className={`font-bold ${viewRecord.condition === 'TEMPORARY POWER SUPPLY' ? 'text-yellow-600' : viewRecord.condition === 'BUILDER LIFT' ? 'text-orange-600' : 'text-gray-800'}`}>
                        {viewRecord.condition || '-'}
                      </span>
                    </div>
                    <div><span className="text-[9px] text-gray-400 font-bold block mb-1">Gen. Date</span><span className="font-bold">{formatDateToDDMMYY(viewRecord.generatedDate)}</span></div>
                    <div className="col-span-2 md:col-span-3">
                      <span className="text-[9px] text-gray-400 font-bold block mb-1">Sys/Pre/Buz</span>
                      <span className="font-bold">
                        {viewRecord.generatedInSystem || '-'} / 
                        <span className={viewRecord.preCheck === 'NO' ? 'text-red-600' : ''}> {viewRecord.preCheck || '-'} </span> / 
                        <span className={viewRecord.buzzer === 'NO' ? 'text-red-600' : ''}> {viewRecord.buzzer || '-'}</span>
                      </span>
                    </div>
                  </div>
                  <div>
                    <span className="text-[9px] text-gray-400 font-bold block mb-1"><MessageSquare className="w-3 h-3 inline" /> ประวัติคอมเมนต์</span>
                    <div className="bg-gray-50 p-2 rounded border max-h-32 overflow-y-auto">
                      {(() => { 
                        const h = parseRemarkHistory(viewRecord.remark); 
                        if (!h.length || !h[0].text) return <div className="text-gray-400 text-center">ไม่มีข้อมูล</div>; 
                        return h.map((x, i) => (
                          <div key={i} className="bg-white p-1.5 rounded border mb-1">
                            <div className="flex justify-between mb-0.5"><span className="text-[8px] text-gray-400">{x.date}</span><span className="text-[8px] font-bold text-gray-600">{x.author}</span></div>
                            <p className="text-[10px]">{x.text}</p>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                </div>
                <div className="bg-gray-50 p-3 border-t flex justify-end gap-2 shrink-0">
                  <button onClick={closeViewModal} className="px-4 py-1.5 bg-white border rounded font-bold">ปิด</button>
                  <button onClick={() => { closeViewModal(); openEditModal(viewRecord); }} className="px-4 py-1.5 bg-blue-600 text-white rounded font-bold flex items-center gap-1"><Edit className="w-3.5 h-3.5" /> แก้ไข</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
