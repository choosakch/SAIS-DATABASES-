<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAIS DATABASE 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #E20015; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    .slide-up { animation: slideUp 0.3s ease-out forwards; }
    .toast-enter { animation: toastEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .sticky-header th { position: sticky; top: 0; z-index: 10; background-color: #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .sticky-col { position: sticky; left: 0; z-index: 5; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); background-color: white; }
    .sticky-col-header { position: sticky; top: 0; left: 0; z-index: 15 !important; background-color: #e5e7eb !important; }
    
    /* สไตล์สำหรับการตรึงคอลัมน์ขวา */
    .sticky-right-status { position: sticky; right: 0; z-index: 5; box-shadow: -2px 0 5px -2px rgba(0,0,0,0.1); }
    .sticky-right-status-header { position: sticky; right: 0; z-index: 15 !important; background-color: #f9fafb !important; box-shadow: -2px 0 5px -2px rgba(0,0,0,0.1); }
    .sticky-right-sla { position: sticky; right: 100px; z-index: 5; }
    .sticky-right-sla-header { position: sticky; right: 100px; z-index: 15 !important; background-color: #fffbeb !important; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
  </style>
</head>
<body class="bg-[#F4F4F4] text-gray-800 antialiased overflow-x-hidden overscroll-y-contain font-sans">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useCallback } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, ChevronLeft,
      AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, 
      AlertTriangle, RefreshCw, Cloud, CloudOff, PieChart, BarChart2, 
      CheckSquare, XCircle, AlertOctagon, Users, Package, History, 
      Layers, Filter, RotateCcw, Activity, Tag, Briefcase, TrendingUp, 
      Target, ShieldAlert, Zap, Award, Eye, Info, Search, MessageSquare, Send, Settings, UserPlus
    } from 'https://esm.sh/lucide-react@0.300.0';

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyvVssxbmdOnE5wypreTNxi9eYnDpkgXWO5grTMU1LklyuP7LwmON_X4YdZumxgS5uX/exec';
    
    const DEFAULT_INSPECTORS = ["Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang", "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti", "Narong Robrum", "Chakrin Dangwichai"];
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "Close OIL", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [
      { value: 'all', label: 'ทุกเดือนในระบบ' }, { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' },
      { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' }, { value: '05', label: 'พฤษภาคม' }, 
      { value: '06', label: 'มิถุนายน' }, { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' },
      { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' }, { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }
    ];

    const formatDateToDDMMYY = (dateString) => {
      if (!dateString) return '-';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '-'; 
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = String(date.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    };

    const getMonthOnly = (dateString) => {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '';
      return String(date.getMonth() + 1).padStart(2, '0');
    };

    const formatSyncTime = (dateObj) => {
      if (!dateObj) return '';
      const hours = String(dateObj.getHours()).padStart(2, '0');
      const minutes = String(dateObj.getMinutes()).padStart(2, '0');
      return `${hours}:${minutes}`;
    };

    const calculateSLA = (inspectionDateStr, status) => {
      if (!inspectionDateStr) return { text: '-', status: 'none' };
      if (['Passed with Completed', 'Close OIL', 'ยกเลิก'].includes(status)) return { text: 'Closed', status: 'closed' };
      if (!['Failed', 'Passed with OIL'].includes(status)) return { text: '-', status: 'none' };
      const inspectDate = new Date(inspectionDateStr);
      if (isNaN(inspectDate.getTime())) return { text: 'Invalid Date', status: 'none' };
      const daysToAdd = status === 'Failed' ? 7 : 28;
      const deadlineDate = new Date(inspectDate);
      deadlineDate.setDate(deadlineDate.getDate() + daysToAdd);
      const today = new Date(); today.setHours(0, 0, 0, 0); deadlineDate.setHours(0, 0, 0, 0);
      const diffTime = deadlineDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      const formattedDate = formatDateToDDMMYY(deadlineDate.toISOString().split('T')[0]);
      if (diffDays < 0) return { text: `Overdue ${Math.abs(diffDays)} วัน`, status: 'overdue', isOverdue: true };
      if (diffDays === 0) return { text: `ครบกำหนดวันนี้`, status: 'warning', isOverdue: false };
      return { text: `เหลือ ${diffDays} วัน`, status: 'pending', isOverdue: false };
    };

    const generateUniqueId = () => { return (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2); };

    const parseRemarkHistory = (str) => {
      if (!str) return [];
      try { const parsed = JSON.parse(str); return Array.isArray(parsed) ? parsed : [{ version: '0', text: str, date: '-', author: 'System' }]; } 
      catch (e) { return [{ version: '0', text: str, date: '-', author: 'System' }]; }
    };
    function App() {
      // 🚨 ตั้งค่าเดือนปัจจุบันให้อัตโนมัติเวลาเปิดแอป
      const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
      
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('pending'); 
      const [filterMonth, setFilterMonth] = useState(currentMonthStr); // ใช้เดือนปัจจุบันเป็นค่าเริ่มต้น
      const [searchTerm, setSearchTerm] = useState('');
      
      const [dashFilters, setDashFilters] = useState({ inspector: 'all', product: 'all', type: 'all', condition: 'all', status: 'all', version: 'all' });
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);

      // 🚨 Admin System State
      const [isAdminOpen, setIsAdminOpen] = useState(false);
      const [inspectorsConfig, setInspectorsConfig] = useState(() => {
        const saved = localStorage.getItem('sais_admin_config_v1');
        if (saved) return JSON.parse(saved);
        return DEFAULT_INSPECTORS.map(name => ({ id: generateUniqueId(), name, certs: PRODUCT_LINES }));
      });
      const [editingAdminInsp, setEditingAdminInsp] = useState(null);

      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 30; 

      const [toast, setToast] = useState(null);
      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const initialFormState = {
        equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '',
        inspectorName: '', productLine: '', type: '', jobSite: '', unit: '',
        preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '', newRemark: '',
        version: '0', versionDate: ''
      };

      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');

      // บันทึก Admin Config ลงเครื่องเสมอ
      useEffect(() => { localStorage.setItem('sais_admin_config_v1', JSON.stringify(inspectorsConfig)); }, [inspectorsConfig]);

      const fetchRecords = useCallback(async (isSilent = false) => {
        if (!isSilent) setSyncStatus('syncing');
        try {
          const response = await fetch(GAS_WEB_APP_URL);
          if (!response.ok) throw new Error('Network Error');
          const data = await response.json();
          if (Array.isArray(data)) {
              const validData = data.filter(item => item.id && item.id.toString().trim() !== '');
              setRecords(validData);
              setSyncStatus('success'); setLastSyncedAt(new Date());
          } else { setRecords([]); setSyncStatus('idle'); }
        } catch (error) { console.error('Fetch Error:', error); setSyncStatus('error'); if (!isSilent) showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error'); }
      }, []);

      useEffect(() => { fetchRecords(); }, [fetchRecords]);

      useEffect(() => {
        let startY = 0;
        const handleTouchStart = (e) => { if (window.scrollY === 0) startY = e.touches[0].clientY; };
        const handleTouchEnd = (e) => {
          if (window.scrollY === 0 && startY > 0) {
            if (e.changedTouches[0].clientY - startY > 100) { showToast('กำลังซิงค์ข้อมูลล่าสุด...', 'success'); fetchRecords(); }
          }
          startY = 0;
        };
        window.addEventListener('touchstart', handleTouchStart, { passive: true });
        window.addEventListener('touchend', handleTouchEnd, { passive: true });
        return () => { window.removeEventListener('touchstart', handleTouchStart); window.removeEventListener('touchend', handleTouchEnd); };
      }, [fetchRecords]);

      useEffect(() => {
        const handleScroll = () => {
          if (window.scrollY > lastScrollY && window.scrollY > 50) setIsNavVisible(false); else setIsNavVisible(true);
          setLastScrollY(window.scrollY);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      useEffect(() => { setCurrentPage(1); }, [activeTab, filterMonth, searchTerm, dashFilters]);

      const latestInspectionDate = useMemo(() => {
        if (records.length === 0) return '';
        const sorted = [...records].sort((a, b) => new Date(b.inspectionDate || 0) - new Date(a.inspectionDate || 0));
        return sorted[0]?.inspectionDate || '';
      }, [records]);

      const displayedRecords = useMemo(() => {
        const filtered = records.filter(rec => {
          const month = getMonthOnly(rec.inspectionDate);
          if (filterMonth !== 'all' && month !== filterMonth) return false;
          if (searchTerm) {
            const searchLower = searchTerm.toLowerCase();
            const eqMatch = String(rec.equipmentNo || '').toLowerCase().includes(searchLower);
            const siteMatch = String(rec.jobSite || '').toLowerCase().includes(searchLower);
            if (!eqMatch && !siteMatch) return false;
          }
          const recVersion = rec.version || '0';
          if (activeTab === 'pending') return recVersion === '0';
          if (activeTab === 'oil') {
             if (recVersion !== '0') return true; 
             return ['Passed with OIL', 'Failed', 'Close OIL'].includes(rec.saisStatus);
          }
          return true;
        });
        
        // 🚨 เรียงลำดับตามวันที่ตรวจสอบ (ใหม่สุดขึ้นก่อน)
        return filtered.sort((a, b) => {
          const dateA = new Date(a.inspectionDate || 0).getTime();
          const dateB = new Date(b.inspectionDate || 0).getTime();
          if (dateA !== dateB) return dateB - dateA;
          const saveA = new Date(a.savedAt || 0).getTime();
          const saveB = new Date(b.savedAt || 0).getTime();
          return saveB - saveA;
        });
      }, [records, filterMonth, activeTab, searchTerm]);

      const totalPages = Math.ceil(displayedRecords.length / ITEMS_PER_PAGE);
      const paginatedRecords = useMemo(() => {
        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
        return displayedRecords.slice(startIndex, startIndex + ITEMS_PER_PAGE);
      }, [displayedRecords, currentPage]);

      const filteredDashboardRecords = useMemo(() => {
        return records.filter(rec => {
          const month = getMonthOnly(rec.inspectionDate);
          if (filterMonth !== 'all' && month !== filterMonth) return false;
          if (dashFilters.inspector !== 'all' && rec.inspectorName !== dashFilters.inspector) return false;
          if (dashFilters.product !== 'all' && rec.productLine !== dashFilters.product) return false;
          if (dashFilters.type !== 'all' && rec.type !== dashFilters.type) return false;
          if (dashFilters.condition !== 'all' && rec.condition !== dashFilters.condition) return false;
          if (dashFilters.status !== 'all' && rec.saisStatus !== dashFilters.status) return false;
          if (dashFilters.version !== 'all' && (rec.version || '0') !== dashFilters.version) return false;
          return true;
        });
      }, [records, filterMonth, dashFilters]);

      const handleFilterChange = (field, value) => setDashFilters(prev => ({ ...prev, [field]: value }));
      const resetDeepFilters = () => setDashFilters({ inspector: 'all', product: 'all', type: 'all', condition: 'all', status: 'all', version: 'all' });
      const handleInputChange = (e) => { setFormData(prev => ({ ...prev, [e.target.name]: e.target.value })); setValidationError(''); };

      const openAddModal = () => {
        let defaultDateStr = latestInspectionDate;
        if (!defaultDateStr && filterMonth !== 'all') {
          const year = new Date().getFullYear();
          defaultDateStr = `${year}-${filterMonth}-01`;
        }
        setFormData({ ...initialFormState, inspectionDate: defaultDateStr, versionDate: defaultDateStr });
        setEditId(null); setValidationError(''); setIsModalOpen(true);
      };

      const openViewModal = (record) => { setViewRecord(record); };
      const closeViewModal = () => { setViewRecord(null); };

      const openEditModal = (record) => {
        setFormData({ ...record, newRemark: '' }); 
        setEditId(record.id); setValidationError(''); setIsModalOpen(true);
      };

      const closeModal = () => { setIsModalOpen(false); };

      const autoSyncToDatabase = async (payload, successMessage) => {
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload),
          });
          const result = await response.json();
          if(result.status === 'success') { setLastSyncedAt(new Date()); showToast(successMessage, 'success'); } 
          else { throw new Error(result.message); }
        } catch (error) { console.error("Sync Error: ", error); showToast(`ล้มเหลว: ${error.message || 'บันทึกไม่สำเร็จ'}`, 'error'); } 
        finally { setIsSubmitting(false); }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (isSubmitting) return; 
        setValidationError('');
        const requiredFields = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
        const missingBaseFields = requiredFields.filter(field => !formData[field] || formData[field].toString().trim() === '');

        if (missingBaseFields.length > 0) { setValidationError(`กรุณากรอกให้ครบ: ${missingBaseFields.join(', ')}`); return; }

        setIsSubmitting(true);
        const originalRecord = editId ? records.find(r => r.id === editId) : null;
        let remarkHistory = parseRemarkHistory(originalRecord ? originalRecord.remark : '[]');
        
        if (formData.newRemark && formData.newRemark.trim() !== '') {
          remarkHistory.push({ version: formData.version || '0', text: formData.newRemark.trim(), date: formatDateToDDMMYY(new Date().toISOString()), author: formData.inspectorName || 'Inspector' });
        }

        const processedData = {
          ...formData,
          displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate), displayGeneratedDate: formData.generatedDate ? formatDateToDDMMYY(formData.generatedDate) : '-', displayVersionDate: formData.versionDate ? formatDateToDDMMYY(formData.versionDate) : '-', remark: JSON.stringify(remarkHistory) 
        };
        delete processedData.newRemark; 

        const originalVersion = originalRecord ? (originalRecord.version || '0') : '0';
        const newVersion = formData.version || '0';
        const isVersionUpgradeFromV0 = originalRecord && originalVersion === '0' && newVersion !== '0';

        let targetRecord; let successMessage = '';
        if (editId && !isVersionUpgradeFromV0) {
          targetRecord = { ...processedData, id: editId };
          setRecords(prev => prev.map(rec => rec.id === editId ? targetRecord : rec));
          successMessage = 'อัปเดตข้อมูลสำเร็จ';
        } else {
          targetRecord = { ...processedData, id: generateUniqueId() };
          setRecords(prev => [targetRecord, ...prev]);
          successMessage = isVersionUpgradeFromV0 ? `อัปเกรด V${newVersion} สู่ Tracking OIL` : 'เพิ่มรายการใหม่สำเร็จ';
        }
        
        closeModal();
        autoSyncToDatabase({ action: 'SAVE', record: targetRecord }, successMessage); 
      };

      const handleDelete = (id) => {
        if(window.confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้ ถาวร?')) {
          setIsSubmitting(true); setRecords(prev => prev.filter(record => record.id !== id)); closeModal(); 
          autoSyncToDatabase({ action: 'DELETE', id: id }, 'ลบข้อมูลสำเร็จ');
        }
      };

      const isCancelled = formData.saisStatus === 'ยกเลิก';

      // 🚨 การกรอง Product Line ตาม Certificate ของ Inspector ที่เลือก
      const selectedInspectorConfig = inspectorsConfig.find(i => i.name === formData.inspectorName);
      const availableProductLines = selectedInspectorConfig ? selectedInspectorConfig.certs : PRODUCT_LINES;

      const AdminModal = () => {
        const [newInspName, setNewInspName] = useState('');
        
        const handleAddInsp = () => {
          if (!newInspName.trim()) return;
          setInspectorsConfig([...inspectorsConfig, { id: generateUniqueId(), name: newInspName.trim(), certs: [] }]);
          setNewInspName('');
        };
        
        const handleDeleteInsp = (id) => {
          if (window.confirm('ลบผู้ตรวจสอบนี้?')) setInspectorsConfig(inspectorsConfig.filter(i => i.id !== id));
        };

        const toggleCert = (inspId, product) => {
          setInspectorsConfig(inspectorsConfig.map(insp => {
            if (insp.id !== inspId) return insp;
            const hasCert = insp.certs.includes(product);
            const newCerts = hasCert ? insp.certs.filter(c => c !== product) : [...insp.certs, product];
            return { ...insp, certs: newCerts };
          }));
        };

        return (
          <div className="fixed inset-0 bg-black/70 z-[60] flex justify-center items-center p-4 backdrop-blur-sm">
            <div className="bg-white w-full max-w-2xl max-h-[90vh] rounded-xl flex flex-col shadow-2xl slide-up">
              <div className="p-4 border-b bg-gray-50 rounded-t-xl flex justify-between items-center">
                <h2 className="font-black text-lg flex items-center gap-2"><Settings className="w-5 h-5 text-gray-700"/> จัดการผู้ตรวจสอบ & Certificate</h2>
                <button onClick={() => setIsAdminOpen(false)} className="bg-gray-200 p-1.5 rounded-full"><X className="w-4 h-4"/></button>
              </div>
              <div className="p-4 overflow-y-auto">
                <div className="flex gap-2 mb-6">

          if (rec.productLine) { if (!productLineStats[rec.productLine]) productLineStats[rec.productLine] = { total: 0, passed: 0, fail: 0, oil: 0 }; productLineStats[rec.productLine].total++; if (rec.saisStatus === 'Passed with Completed' || rec.saisStatus === 'Close OIL') productLineStats[rec.productLine].passed++; if (rec.saisStatus === 'Failed') productLineStats[rec.productLine].fail++; if (rec.saisStatus === 'Passed with OIL') productLineStats[rec.productLine].oil++; }
        });

                </div>

                      <div className="space-y-1"><label className="text-[9px] sm:text-[10px] font-bold text-gray-500 uppercase">Buzzer</label><select name="buzzer" value={formData.buzzer} onChange={handleInputChange} className="w-full border border-gray-300 bg-white rounded-lg p-2 text-xs focus:ring-2 outline-none shadow-sm"><option value="">-</option><option value="YES">YES</option><option value="N/A">N/A</option></select></div>
                    </div>

                    <div className={`sm:col-span-2 lg:col-span-4 bg-gray-50 p-3 rounded-lg border border-gray-200 ${!editId ? 'lg:col-span-2' : ''}`}>
                      <label className="text-[10px] sm:text-xs font-bold text-gray-800 uppercase flex items-center gap-1.5 mb-3"><MessageSquare className="w-4 h-4"/> ประวัติการคอมเมนต์ / ข้อบกพร่อง</label>
                      
                      <div className="space-y-2 mb-3 max-h-40 overflow-y-auto custom-scrollbar bg-white rounded border border-gray-200 p-2">
                        {(() => {
                          const history = parseRemarkHistory(formData.remark);
                          if (history.length === 0 || !history[0].text) return <div className="text-xs text-gray-400 text-center py-4">ยังไม่มีคอมเมนต์ในระบบ</div>;
                          return history.map((h, i) => (
                            <div key={i} className="bg-yellow-50/80 p-2 rounded border border-yellow-100">
                              <div className="flex justify-between items-center mb-1">
                                <span className="text-[10px] font-bold text-yellow-800 bg-yellow-200 px-1.5 rounded">V{h.version}</span>
                                <span className="text-[9px] text-gray-400">{h.author} | {h.date}</span>
                              </div>
                              <p className="text-xs text-gray-700">{h.text}</p>
                            </div>
                          ));
                        })()}
                      </div>

                      <div className="flex gap-2">
                        <input type="text" name="newRemark" value={formData.newRemark || ''} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-[#E20015]/20 focus:border-[#E20015] outline-none shadow-sm" placeholder={isCancelled ? "ระบุเหตุผลการยกเลิก..." : "เพิ่มคอมเมนต์ใหม่สำหรับ Version นี้..."} />
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-50 p-4 border-t border-gray-200 flex justify-between items-center shrink-0 pb-safe sm:pb-4 rounded-b-xl">
                  <div>
                    {editId && (
                      <button onClick={() => handleDelete(editId)} disabled={isSubmitting} className="flex items-center gap-1.5 px-3 py-2.5 sm:px-4 sm:py-2 rounded-lg font-bold text-xs sm:text-sm text-red-600 bg-white border border-red-200 hover:bg-red-50 transition-colors shadow-sm disabled:opacity-50"><Trash2 className="w-4 h-4" /> <span className="hidden sm:inline">ลบรายการ</span></button>
                    )}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={closeModal} className="px-4 py-2.5 sm:py-2 rounded-lg font-bold text-xs sm:text-sm text-gray-700 bg-white border border-gray-300 hover:bg-gray-100 shadow-sm transition-colors">ยกเลิก</button>
                    <button onClick={handleSubmit} disabled={isSubmitting} className="flex items-center gap-1.5 bg-[#E20015] hover:bg-red-700 text-white px-5 sm:px-6 py-2.5 sm:py-2 rounded-lg font-bold text-xs sm:text-sm shadow-md active:scale-95 transition-all disabled:bg-red-400 disabled:cursor-wait">
                      {isSubmitting ? <RefreshCw className="w-4 h-4 animate-spin"/> : <Save className="w-4 h-4" />}
                      {isSubmitting ? 'กำลังบันทึก...' : editId ? 'บันทึกอัปเดต' : 'เพิ่มข้อมูล'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {viewRecord && (
             <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center sm:p-4 backdrop-blur-sm">
              <div className="bg-white w-full sm:rounded-xl sm:max-w-2xl max-h-[90vh] flex flex-col relative slide-up sm:fade-in shadow-2xl rounded-t-2xl">
                <div className="bg-gray-50 p-4 border-b border-gray-200 flex justify-between items-center rounded-t-2xl sm:rounded-t-xl shrink-0">
                  <div className="flex items-center gap-2"><Eye className="w-5 h-5 text-blue-600" /><h2 className="text-base sm:text-lg font-black text-gray-900">รายละเอียดข้อมูล</h2></div>
                  <button onClick={closeViewModal} className="bg-white border border-gray-200 hover:bg-gray-100 p-1.5 rounded-full text-gray-500 transition-colors shadow-sm"><X className="w-4 h-4" /></button>
                </div>
                
                <div className="p-5 sm:p-6 overflow-y-auto custom-scrollbar">
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-y-5 gap-x-4">
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Eq. No.</span><span className="text-xl font-black text-gray-900 leading-none">{viewRecord.equipmentNo}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Insp. Date</span><span className="text-sm font-bold text-gray-800">{formatDateToDDMMYY(viewRecord.inspectionDate)}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Inspector</span><span className="text-sm font-bold text-gray-800">{viewRecord.inspectorName}</span></div>
                    
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Product Line</span><span className="text-xs font-bold text-gray-800 bg-gray-100 px-2.5 py-1 rounded-md">{viewRecord.productLine}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Type</span><span className="text-xs font-bold text-gray-800 bg-gray-100 px-2.5 py-1 rounded-md">{viewRecord.type}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Unit</span><span className="text-sm font-bold text-gray-800">{viewRecord.unit}</span></div>
                    
                    <div className="col-span-2 sm:col-span-3"><span className="text-[10px] text-gray-400 font-bold uppercase block mb-1">Job Site</span><span className="text-sm font-bold text-gray-800 bg-gray-50 border border-gray-100 p-3 rounded-lg block shadow-inner">{viewRecord.jobSite}</span></div>
                  </div>

                  <div className="border-t border-dashed border-gray-200 my-5"></div>
                  
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-y-5 gap-x-4 mb-5">
                    <div>
                      <span className="text-[10px] text-gray-400 font-bold uppercase block mb-1">SAIS Status</span>
                      <span className={`px-2.5 py-1 rounded text-xs font-bold shadow-sm border ${
                        viewRecord.saisStatus === 'Passed with Completed' ? 'bg-green-100 text-green-700 border-green-200' :
                        viewRecord.saisStatus === 'Close OIL' ? 'bg-green-600 text-white border-green-600' :
                        viewRecord.saisStatus === 'Failed' ? 'bg-red-100 text-red-700 border-red-200' : 
                        viewRecord.saisStatus === 'Passed with OIL' ? 'bg-amber-100 text-amber-700 border-amber-200' : 
                        viewRecord.saisStatus === 'ยกเลิก' ? 'bg-gray-800 text-gray-200 border-gray-900' :
                        'bg-gray-100 text-gray-500 border-gray-200'
                      }`}>{viewRecord.saisStatus || 'PENDING'}</span>
                    </div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Version</span><span className="text-sm font-black text-blue-800">V{viewRecord.version || '0'}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Version Date</span><span className="text-sm font-bold text-gray-800">{formatDateToDDMMYY(viewRecord.versionDate)}</span></div>
                    
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Condition</span><span className="text-sm font-bold text-gray-800">{viewRecord.condition || '-'}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Generated Date</span><span className="text-sm font-bold text-gray-800">{formatDateToDDMMYY(viewRecord.generatedDate)}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Gen. System</span><span className="text-sm font-bold text-gray-800">{viewRecord.generatedInSystem || '-'}</span></div>
                    
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Pre-Check</span><span className="text-sm font-bold text-gray-800">{viewRecord.preCheck || '-'}</span></div>
                    <div><span className="text-[10px] text-gray-400 font-bold uppercase block mb-0.5">Buzzer</span><span className="text-sm font-bold text-gray-800">{viewRecord.buzzer || '-'}</span></div>
                  </div>

                  <div>
                    <span className="text-[10px] text-gray-400 font-bold uppercase block mb-2"><MessageSquare className="w-3.5 h-3.5 inline mr-1 text-gray-400"/> ประวัติการคอมเมนต์ (Remark Timeline)</span>
                    <div className="space-y-2 bg-gray-50 p-3 rounded-lg border border-gray-200 max-h-40 overflow-y-auto custom-scrollbar">
                      {(() => {
                        const history = parseRemarkHistory(viewRecord.remark);
                        if (history.length === 0 || !history[0].text) return <div className="text-sm text-gray-500 text-center py-2">ไม่มีข้อมูลคอมเมนต์</div>;
                        return history.map((h, i) => (
                          <div key={i} className="bg-white p-2.5 rounded shadow-sm border border-gray-100">
                            <div className="flex justify-between items-center mb-1.5">
                              <span className="text-[10px] font-black text-white bg-blue-600 px-1.5 py-0.5 rounded shadow-sm">V{h.version}</span>
                              <span className="text-[9px] font-bold text-gray-400">{h.author} | {h.date}</span>
                            </div>
                            <p className="text-xs text-gray-700 leading-relaxed">{h.text}</p>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                </div>

                <div className="bg-gray-50 p-4 border-t border-gray-200 flex justify-end gap-2 shrink-0 pb-safe sm:pb-4 rounded-b-xl">
                  <button onClick={closeViewModal} className="px-5 py-2.5 sm:py-2 bg-white border border-gray-300 hover:bg-gray-100 rounded-lg text-sm font-bold text-gray-700 shadow-sm transition-colors">ปิดหน้าต่าง</button>
                  <button onClick={() => { closeViewModal(); openEditModal(viewRecord); }} className="px-5 py-2.5 sm:py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md flex items-center gap-1.5 transition-colors"><Edit className="w-4 h-4"/> แก้ไขข้อมูลนี้</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
