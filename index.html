<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAIS DATABASE 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #E20015; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    .slide-up { animation: slideUp 0.3s ease-out forwards; }
    .toast-enter { animation: toastEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Sticky Top Header Only */
    .sticky-header th { position: sticky; top: 0; z-index: 10; background-color: #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    /* SVG Chart Utilities */
    .svg-chart text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body class="bg-[#F4F4F4] text-gray-800 antialiased overflow-x-hidden overscroll-y-contain font-sans">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useCallback } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, ChevronLeft, AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, AlertTriangle, RefreshCw, Cloud, CloudOff, BarChart2, Filter, RotateCcw, Activity, ShieldAlert, Target, Award, Package, Eye, MessageSquare, Search, History, Settings, TrendingUp, PieChart, Users } from 'https://esm.sh/lucide-react@0.300.0';

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyvVssxbmdOnE5wypreTNxi9eYnDpkgXWO5grTMU1LklyuP7LwmON_X4YdZumxgS5uX/exec';
    
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [{ value: 'all', label: 'ทุกเดือนในระบบ' }, { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' }, { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' }, { value: '05', label: 'พฤษภาคม' }, { value: '06', label: 'มิถุนายน' }, { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' }, { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' }, { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }];
    const DEFAULT_INSPECTORS = ["Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang", "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti", "Narong Robrum", "Chakrin Dangwichai"];
    const STANDARD_UNITS = ["L1", "L2", "PL1", "PL2", "SL1"];

    const formatDateToDDMMYY = (d) => { if (!d) return '-'; const date = new Date(d); return isNaN(date.getTime()) ? '-' : `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getFullYear()).slice(-2)}`; };
    const formatDateForInput = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; };
    const getMonthOnly = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : String(date.getMonth() + 1).padStart(2, '0'); };
    const formatSyncTime = (d) => d ? `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}` : '';
    const generateUniqueId = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
    const parseRemarkHistory = (str) => { try { const p = JSON.parse(str); return Array.isArray(p) ? p : [{ text: str, date: '-', author: 'System' }]; } catch(e) { return str ? [{ text: str, date: '-', author: 'System' }] : []; } };

    function App() {
      const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('records'); 
      const [filterMonth, setFilterMonth] = useState(currentMonthStr);
      const [searchTerm, setSearchTerm] = useState('');
      const [dashFilters, setDashFilters] = useState({ inspector: 'all', product: 'all', type: 'all', condition: 'all', status: 'all' });
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 30; 
      const [toast, setToast] = useState(null);
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [inspectorsData, setInspectorsData] = useState(() => {
        try { const saved = localStorage.getItem('sais_inspectors_data'); if (saved) return JSON.parse(saved); } catch(e) {}
        return DEFAULT_INSPECTORS.map(name => ({ name, certs: [...PRODUCT_LINES] }));
      });

      useEffect(() => { localStorage.setItem('sais_inspectors_data', JSON.stringify(inspectorsData)); }, [inspectorsData]);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const closeViewModal = () => setViewRecord(null);

      const initialFormState = { equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '', inspectorName: '', productLine: '', type: '', jobSite: '', unit: '', preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '', newRemark: '' };
      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');

      const fetchRecords = useCallback(async (isSilent = false) => {
        if (!isSilent) setSyncStatus('syncing');
        try {
          const res = await fetch(GAS_WEB_APP_URL); if (!res.ok) throw new Error('Net Error');
          const data = await res.json();
          if (Array.isArray(data)) { setRecords(data.filter(i => i.id && i.id.toString().trim() !== '')); setSyncStatus('success'); setLastSyncedAt(new Date()); } 
          else { setRecords([]); setSyncStatus('idle'); }
        } catch (e) { setSyncStatus('error'); if (!isSilent) showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error'); }
      }, []);

      useEffect(() => { fetchRecords(); }, [fetchRecords]);

      useEffect(() => {
        let startY = 0;
        const ts = (e) => { if (window.scrollY === 0) startY = e.touches[0].clientY; };
        const te = (e) => { if (window.scrollY === 0 && startY > 0 && e.changedTouches[0].clientY - startY > 100) { showToast('อัปเดตข้อมูล...', 'success'); fetchRecords(); } startY = 0; };
        window.addEventListener('touchstart', ts, { passive: true }); window.addEventListener('touchend', te, { passive: true });
        return () => { window.removeEventListener('touchstart', ts); window.removeEventListener('touchend', te); };
      }, [fetchRecords]);

      useEffect(() => {
        const handleScroll = () => { setIsNavVisible(window.scrollY < lastScrollY || window.scrollY < 50); setLastScrollY(window.scrollY); };
        window.addEventListener('scroll', handleScroll, { passive: true }); return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      useEffect(() => { setCurrentPage(1); }, [activeTab, filterMonth, searchTerm, dashFilters]);

      const latestInspectionDate = useMemo(() => {
        const sorted = [...records].sort((a, b) => new Date(b.inspectionDate || 0) - new Date(a.inspectionDate || 0)); return sorted[0]?.inspectionDate || '';
      }, [records]);

      const displayedRecords = useMemo(() => {
        return records.filter(rec => {
          if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
          if (searchTerm) { const s = searchTerm.toLowerCase(); if (!String(rec.equipmentNo||'').toLowerCase().includes(s) && !String(rec.jobSite||'').toLowerCase().includes(s)) return false; }
          return true;
        }).sort((a, b) => {
           const dA = new Date(a.inspectionDate || 0).getTime();
           const dB = new Date(b.inspectionDate || 0).getTime();
           if (!isNaN(dA) && !isNaN(dB)) { if (dA !== dB) return dA - dB; }
           return parseInt(a.id || 0) - parseInt(b.id || 0);
        });
      }, [records, filterMonth, searchTerm]);

      const totalPages = Math.ceil(displayedRecords.length / ITEMS_PER_PAGE);
      const paginatedRecords = useMemo(() => displayedRecords.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE), [displayedRecords, currentPage]);

      // คำนวณเพื่อจัดกลุ่มวันที่ และสลับสี (ขาว/เทาอ่อน) ตามกลุ่มของวันที่
      const processedPaginatedRecords = useMemo(() => {
        let currentBgIsGray = false;
        let lastProcessedDate = null;
        return paginatedRecords.map((r, i) => {
          const rDate = formatDateToDDMMYY(r.inspectionDate);
          let showDate = false;
          
          if (rDate !== lastProcessedDate) {
            showDate = true;
            if (i > 0) currentBgIsGray = !currentBgIsGray;
            lastProcessedDate = rDate;
          }
          
          return {
            ...r,
            displayDateFormatted: rDate,
            showDate: showDate,
            bgClass: currentBgIsGray ? 'bg-gray-50' : 'bg-white'
          };
        });
      }, [paginatedRecords]);

      const filteredDash = useMemo(() => records.filter(rec => {
        if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
        if (dashFilters.inspector !== 'all' && rec.inspectorName !== dashFilters.inspector) return false;
        if (dashFilters.product !== 'all' && rec.productLine !== dashFilters.product) return false;
        if (dashFilters.type !== 'all' && rec.type !== dashFilters.type) return false;
        if (dashFilters.condition !== 'all' && rec.condition !== dashFilters.condition) return false;
        if (dashFilters.status !== 'all' && rec.saisStatus !== dashFilters.status) return false;
        return true;
      }), [records, filterMonth, dashFilters]);

      const trendFilteredDash = useMemo(() => records.filter(rec => {
        if (dashFilters.inspector !== 'all' && rec.inspectorName !== dashFilters.inspector) return false;
        if (dashFilters.product !== 'all' && rec.productLine !== dashFilters.product) return false;
        if (dashFilters.type !== 'all' && rec.type !== dashFilters.type) return false;
        if (dashFilters.condition !== 'all' && rec.condition !== dashFilters.condition) return false;
        if (dashFilters.status !== 'all' && rec.saisStatus !== dashFilters.status) return false;
        return true;
      }), [records, dashFilters]);

      const handleInput = (e) => { setFormData(p => ({ ...p, [e.target.name]: e.target.value })); setValidationError(''); };
      
      const openAddModal = () => { 
        setFormData({ ...initialFormState, inspectionDate: formatDateForInput(latestInspectionDate) || (filterMonth !== 'all' ? `2026-${filterMonth}-01` : '') }); 
        setEditId(null); 
        setValidationError(''); 
        setIsModalOpen(true); 
      };
      
      const closeModal = () => setIsModalOpen(false);
      const openViewModal = (r) => setViewRecord(r);
      const openEditModal = (r) => { 
        setFormData({ 
          ...r, 
          inspectionDate: formatDateForInput(r.inspectionDate),
          generatedDate: formatDateForInput(r.generatedDate),
          newRemark: '' 
        }); 
        setEditId(r.id); 
        setValidationError(''); 
        setIsModalOpen(true); 
      };

      const syncDb = async (payload, msg) => {
        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
          const text = await res.text();
          let out;
          try { out = JSON.parse(text); } catch(e) { throw new Error("Invalid Server Response"); }
          if(out.status === 'success') { setLastSyncedAt(new Date()); showToast(msg); } else throw new Error(out.message || "Unknown Error");
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const handleSubmit = async (e) => {
        e.preventDefault(); 
        if (isSubmitting) return; 
        setValidationError('');
        
        try {
            const req = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
            const missing = req.filter(f => !formData[f] || String(formData[f]).trim() === '');
            if (missing.length > 0) return setValidationError(`กรุณากรอกข้อมูลสำคัญให้ครบถ้วน: ${missing.join(', ')}`);
            
            const eqString = String(formData.equipmentNo).trim();
            const eqRegex = /^\d+$/;
            if (!eqRegex.test(eqString)) return setValidationError('รูปแบบ Eq No. ไม่ถูกต้อง (ต้องเป็นตัวเลขเท่านั้น)');

            if (formData.generatedDate && formData.inspectionDate) {
              const genDate = new Date(formData.generatedDate);
              const inspDate = new Date(formData.inspectionDate);
              genDate.setHours(0,0,0,0); inspDate.setHours(0,0,0,0);
              if (genDate < inspDate) return setValidationError('วันที่ Gen Date ต้องไม่ก่อนวันที่ Inspection Date');
            }
            
            setIsSubmitting(true);
            
            const og = editId ? records.find(r => String(r.id) === String(editId)) : null;
            let hist = parseRemarkHistory(og?.remark);
            
            if (formData.newRemark && String(formData.newRemark).trim()) {
               hist.push({ text: String(formData.newRemark).trim(), date: formatDateToDDMMYY(new Date()), author: formData.inspectorName || 'System' });
            }

            const pData = { 
               ...formData, 
               equipmentNo: eqString, 
               displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate), 
               displayGeneratedDate: formatDateToDDMMYY(formData.generatedDate), 
               remark: JSON.stringify(hist) 
            };
            delete pData.newRemark;

            let target, msg;
            if (editId) { 
               target = { ...pData, id: editId }; 
               setRecords(p => p.map(r => String(r.id) === String(editId) ? target : r)); 
               msg = 'อัปเดตสำเร็จ'; 
            } else { 
               target = { ...pData, id: generateUniqueId() }; 
               setRecords(p => [target, ...p]); 
               msg = 'เพิ่มสำเร็จ'; 
            }
            
            closeModal(); 
            await syncDb({ action: 'SAVE', record: target }, msg);
            
        } catch (err) {
            setValidationError(`ระบบขัดข้อง: ${err.message}`);
            setIsSubmitting(false);
        }
      };

      const handleDelete = (id) => {
        if(window.confirm('ยืนยันลบถาวร?')) { setIsSubmitting(true); setRecords(p => p.filter(r => String(r.id) !== String(id))); closeModal(); syncDb({ action: 'DELETE', id }, 'ลบสำเร็จ'); }
      };

      const updateInspectorName = (idx, newName) => { const newData = [...inspectorsData]; newData[idx].name = newName; setInspectorsData(newData); };
      const toggleCert = (idx, pl, isChecked) => { const newData = [...inspectorsData]; if (isChecked) newData[idx].certs.push(pl); else newData[idx].certs = newData[idx].certs.filter(c => c !== pl); setInspectorsData(newData); };
      const deleteInspector = (idx) => { if(window.confirm('ลบรายชื่อนี้?')) setInspectorsData(inspectorsData.filter((_, i) => i !== idx)); };
      const addInspector = () => setInspectorsData([...inspectorsData, { name: 'New Inspector', certs: [] }]);

      const renderDashboard = () => {
        let stats = { total: 0, fpy: 0, failed: 0, cancelled: 0 };
        filteredDash.forEach(r => {
          if (r.saisStatus === 'ยกเลิก') { stats.cancelled++; return; }
          stats.total++;
          if (r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') stats.fpy++;
          if (r.saisStatus === 'Failed') stats.failed++;
        });
        const fpyRate = stats.total > 0 ? Math.round((stats.fpy / stats.total) * 100) : 0;

        const statusRawData = [
          { label: 'Passed (FPY)', value: stats.fpy, color: '#10b981' }, 
          { label: 'Failed Defect', value: stats.failed, color: '#ef4444' } 
        ].filter(d => d.value > 0);
        
        const totalStatus = statusRawData.reduce((acc, curr) => acc + curr.value, 0);
        let accPercent = 0;
        const donutSegments = statusRawData.map(d => {
           const percent = totalStatus > 0 ? (d.value / totalStatus) * 100 : 0;
           const dashArray = `${percent} ${100 - percent}`;
           const dashOffset = 25 - accPercent;
           accPercent += percent;
           return { ...d, percent, dashArray, dashOffset };
        });

        const productStats = {};
        filteredDash.forEach(r => {
           if (r.saisStatus === 'ยกเลิก') return;
           if(!r.productLine) return;
           if(!productStats[r.productLine]) productStats[r.productLine] = { total: 0, failed: 0 };
           productStats[r.productLine].total++;
           if(r.saisStatus === 'Failed') productStats[r.productLine].failed++;
        });
        const barData = Object.entries(productStats).map(([name, data]) => ({ name, ...data })).sort((a,b) => b.total - a.total).slice(0, 8); 
        const maxBar = Math.max(...barData.map(d => d.total), 1);

        const inspectorStats = {};
        filteredDash.forEach(r => {
           if (r.saisStatus === 'ยกเลิก') return;
           if(!r.inspectorName) return;
           if(!inspectorStats[r.inspectorName]) inspectorStats[r.inspectorName] = { total: 0, fpy: 0 };
           inspectorStats[r.inspectorName].total++;
           if(r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') inspectorStats[r.inspectorName].fpy++;
        });
        const leaderboardData = Object.entries(inspectorStats).map(([name, data]) => ({ name, ...data })).sort((a,b) => b.total - a.total);

        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const trendData = monthNames.map(m => ({ month: m, total: 0, fpy: 0 }));
        
        trendFilteredDash.forEach(r => {
            if (r.saisStatus === 'ยกเลิก') return;
            if(!r.inspectionDate) return;
            const d = new Date(r.inspectionDate);
            if(!isNaN(d.getTime())) {
                const mIdx = d.getMonth();
                trendData[mIdx].total++;
                if(r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') trendData[mIdx].fpy++;
            }
        });
        const maxTrend = Math.max(...trendData.map(d => d.total), 1);

        return (
          <div className="space-y-4 fade-in pb-10">
            {/* Filter Card */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-4 border-b pb-2"><div className="flex items-center gap-2 font-bold text-sm"><Filter className="w-5 h-5 text-[#E20015]"/> Analytics Engine</div><button onClick={()=>setDashFilters({inspector:'all',product:'all',type:'all',condition:'all',status:'all'})} className="text-xs flex gap-1 text-gray-500 hover:text-[#E20015] bg-gray-50 px-2 py-1 rounded font-bold"><RotateCcw className="w-3.5 h-3.5"/> ล้าง</button></div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                {['inspector','product','type','condition','status'].map(f => (
                  <select key={f} value={dashFilters[f]} onChange={(e)=>setDashFilters(p=>({...p,[f]:e.target.value}))} className="w-full bg-gray-50 border rounded-lg p-2 text-xs font-bold outline-none focus:ring-1 focus:ring-[#E20015] capitalize"><option value="all">{f} (All)</option>{(f==='inspector'?inspectorsData.map(i=>i.name):f==='product'?PRODUCT_LINES:f==='type'?TYPES:f==='condition'?CONDITIONS:f==='status'?SAIS_STATUSES:[]).map(o=><option key={o} value={o}>{o}</option>)}</select>
                ))}
              </div>
            </div>

            {filteredDash.length === 0 ? <div className="bg-white rounded-xl shadow-sm p-10 text-center"><Activity className="w-12 h-12 text-gray-200 mx-auto mb-2 animate-pulse"/><h3 className="font-bold text-gray-500">ไม่พบข้อมูล</h3></div> : (
              <>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-5 rounded-xl border border-blue-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><Target className="w-24 h-24 text-blue-500" /></div>
                     <span className="text-[10px] font-bold text-blue-600 uppercase mb-1">First Pass Yield</span>
                     <div className="text-3xl font-black text-gray-800">{fpyRate}%</div>
                     <span className="text-[10px] text-gray-500 mt-1">ตรวจผ่าน (ไม่ Failed)</span>
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-red-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><ShieldAlert className="w-24 h-24 text-red-500" /></div>
                     <span className="text-[10px] font-bold text-red-600 uppercase mb-1">Failed Defects</span>
                     <div className="text-3xl font-black text-gray-800">{stats.failed} <span className="text-sm text-gray-400">งาน</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">ต้องแก้ไข (Rework)</span>
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><Package className="w-24 h-24 text-gray-500" /></div>
                     <span className="text-[10px] font-bold text-gray-600 uppercase mb-1">Total Inspected</span>
                     <div className="text-3xl font-black text-gray-800">{stats.total} <span className="text-sm text-gray-400">งาน</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">ยอดเข้าตรวจทั้งหมด</span>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col">

                                 ))}
                              </div>
                           </>

                                  const barWidth = 360 / barData.length - 8;
                                  const barHeight = (d.total / maxBar) * 120;
                                  const x = i * (barWidth + 8) + 20;
                                  const y = 140 - barHeight;
                                  const color = d.failed > 0 ? '#ef4444' : '#6366f1'; 
                                  return (
                                     <g key={i}>
                                        <rect x={x} y={y} width={barWidth} height={barHeight} fill={color} rx="2" className="transition-all duration-300" />
                                        <text x={x + barWidth/2} y={155} fontSize="9" textAnchor="middle" fill="#6b7280" className="uppercase font-bold">{d.name.substring(0,6)}</text>
                                        <text x={x + barWidth/2} y={y - 5} fontSize="10" textAnchor="middle" fill={color} fontWeight="bold">{d.total}</text>

                                  )
                              })}
                           </svg>

                      <div className="text-[9px] text-gray-400 text-center mt-1">* แท่งสีแดง = มีสถานะ Failed ปะปนอยู่</div>

                            <line x1="30" y1="20" x2="480" y2="20" stroke="#f3f4f6" strokeWidth="1" />
                            <line x1="30" y1="80" x2="480" y2="80" stroke="#f3f4f6" strokeWidth="1" />
                            <line x1="30" y1="140" x2="480" y2="140" stroke="#f3f4f6" strokeWidth="1" />
                            <text x="25" y="24" fontSize="9" textAnchor="end" fill="#9ca3af">{maxTrend}</text>
                            <text x="25" y="84" fontSize="9" textAnchor="end" fill="#9ca3af">{Math.round(maxTrend/2)}</text>
                            <text x="25" y="144" fontSize="9" textAnchor="end" fill="#9ca3af">0</text>
                            
                            {(() => {
                                const step = 450 / 11;
                                const pointsTotal = trendData.map((d,i) => `${40 + i*step},${140 - (d.total/maxTrend)*120}`).join(' ');
                                const pointsFpy = trendData.map((d,i) => `${40 + i*step},${140 - (d.fpy/maxTrend)*120}`).join(' ');
                                
                                return (
                                   <>
                                      <polyline points={pointsTotal} fill="none" stroke="#d1d5db" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                                      <polyline points={pointsFpy} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                                      {trendData.map((d,i) => (
                                         <g key={i}>
                                           <circle cx={40 + i*step} cy={140 - (d.total/maxTrend)*120} r="3" fill="#d1d5db" />

                                      ))}
                                   </>

                   </div>

                                     <div className="text-xs font-bold text-gray-700 w-24 truncate">{d.name}</div>

                                  <div className="flex items-center gap-2 text-xs">

                      <label className="font-bold text-gray-500 uppercase">Inspector *</label>
                      <select name="inspectorName" value={formData.inspectorName} onChange={handleInput} className="w-full border rounded p-2 focus:ring-1 outline-none">
                        <option value="">-- เลือก --</option>
                        {inspectorsData.map(o => (
                          <option key={o.name} value={o.name}>{o.name}</option>
                        ))}
                      </select>
                    </div>
                    
                    {/* Input: Product */}
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Product *</label>
                      {(() => { 
                        const selInsp = inspectorsData.find(i => i.name === formData.inspectorName); 
                        const availablePLs = selInsp ? selInsp.certs : PRODUCT_LINES;
                        return (
                          <select name="productLine" value={formData.productLine} onChange={handleInput} className="w-full border rounded p-2 focus:ring-1 outline-none">
                            <option value="">-- เลือก --</option>
                            {availablePLs.map(o => (
                              <option key={o} value={o}>{o}</option>
                            ))}
                          </select>
                        );
                      })()}
                    </div>
                    
                    {/* Input: Type */}
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Type *</label>
                      <select name="type" value={formData.type} onChange={handleInput} className="w-full border rounded p-2 focus:ring-1 outline-none">
                        <option value="">-- เลือก --</option>
                        {TYPES.map(o => (
                          <option key={o} value={o}>{o}</option>
                        ))}
                      </select>
                    </div>
                    
                    {/* Input: Job Site */}
                    <div className="space-y-1 col-span-2">
                      <label className="font-bold text-gray-500 uppercase">Site *</label>
                      <input 
                        type="text" 
                        name="jobSite" 
                        value={formData.jobSite} 
                        onChange={handleInput} 
                        className="w-full border rounded p-2 focus:ring-1 outline-none" 
                      />
                    </div>
                    
                    {/* Input: Unit */}
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Unit *</label>
                      <div className="flex flex-col gap-1">
                         <select 
                            value={STANDARD_UNITS.includes(formData.unit) ? formData.unit : (formData.unit ? 'OTHER' : '')} 
                            onChange={(e) => {
                               if(e.target.value === 'OTHER') {
                                  handleInput({ target: { name: 'unit', value: ' ' } }); // เคาะสเปซบาร์ 1 ครั้งเพื่อเปิดช่องพิมพ์
                               } else {
                                  handleInput({ target: { name: 'unit', value: e.target.value } });
                               }
                            }}
                            className="w-full border rounded p-2 focus:ring-1 outline-none"
                         >
                            <option value="">-- เลือก --</option>
                            {STANDARD_UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                            <option value="OTHER">อื่นๆ (พิมพ์เอง)</option>
                         </select>
                         {(!STANDARD_UNITS.includes(formData.unit) && formData.unit !== '') && (
                            <input 
                               type="text" 
                               name="unit" 
                               value={formData.unit.trim()} 
                               onChange={handleInput} 
                               placeholder="พิมพ์ Unit ที่นี่..." 
                               className="w-full border rounded p-2 focus:ring-1 outline-none fade-in border-blue-300 bg-blue-50" 
                            />
                         )}
                      </div>
                    </div>

                    <div className="col-span-2 lg:col-span-4 border-t my-1"></div>
                    
                    {/* Input: Status */}
                    <div className="space-y-1 col-span-2 lg:col-span-1">
                      <label className="font-bold text-blue-700 uppercase">Status</label>
                      <select name="saisStatus" value={formData.saisStatus} onChange={handleInput} className="w-full border border-blue-300 bg-blue-50 rounded p-2 font-bold text-blue-800 outline-none">
                        <option value="">-- เลือก --</option>
                        {SAIS_STATUSES.map(o => (
                          <option key={o} value={o}>{o}</option>
                        ))}
                      </select>
                    </div>
                    
                    {/* Input: Condition */}
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Condition</label>
                      <select name="condition" value={formData.condition} onChange={handleInput} className="w-full border rounded p-2 outline-none">
                        <option value="">-- เลือก --</option>
                        {CONDITIONS.map(o => (
                          <option key={o} value={o}>{o}</option>
                        ))}
                      </select>
                    </div>
                    
                    {/* Input: Gen Date */}
                    <div className="space-y-1">
                      <label className="font-bold text-gray-500 uppercase">Gen Date</label>
                      <input 
                        type="date" 
                        name="generatedDate" 
                        value={formData.generatedDate} 
                        onChange={handleInput} 
                        className="w-full border rounded p-2 outline-none" 
                      />
                    </div>
                    
                    {/* Input Group: Sys, Pre, Buz */}
                    <div className="grid grid-cols-3 gap-1 col-span-2 lg:col-span-1">
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Gen Sys</label>
                        <select name="generatedInSystem" value={formData.generatedInSystem} onChange={handleInput} className="w-full border rounded p-1.5 outline-none">
                          <option value="">-</option>
                          <option value="YES">YES</option>
                        </select>
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Pre</label>
                        <select name="preCheck" value={formData.preCheck} onChange={handleInput} className="w-full border rounded p-1.5 outline-none">
                          <option value="">-</option>
                          <option value="OK">OK</option>
                          <option value="NO">NO</option>
                        </select>
                      </div>
                      <div>
                        <label className="text-[9px] font-bold text-gray-500">Buz</label>
                        <select name="buzzer" value={formData.buzzer} onChange={handleInput} className="w-full border rounded p-1.5 outline-none">
                          <option value="">-</option>
                          <option value="YES">YES</option>
                          <option value="N/A">N/A</option>
                        </select>
                      </div>
                    </div>
                    
                    {/* Input: Remark / History */}
                    <div className="col-span-2 lg:col-span-4 bg-gray-50 p-2 rounded border">
                      <label className="font-bold text-gray-800 flex gap-1 mb-2">
                        <MessageSquare className="w-3 h-3" /> ประวัติคอมเมนต์
                      </label>
                      <div className="space-y-1 mb-2 max-h-24 overflow-y-auto">
                        {(() => { 
                          const h = parseRemarkHistory(formData.remark); 
                          if (!h.length || !h[0].text) return <div className="text-gray-400 py-1 text-center">ไม่มีคอมเมนต์</div>; 
                          return h.map((x, i) => (
                            <div key={i} className="bg-white p-1.5 rounded border mb-1">
                              <div className="flex justify-between mb-0.5">
                                <span className="text-[8px] text-gray-400">{x.date}</span>
                                <span className="text-[8px] font-bold text-gray-600">{x.author}</span>
                              </div>
                              <p className="text-[10px]">{x.text}</p>
                            </div>
                          ));
                        })()}
                      </div>
                      <input 
                        type="text" 
                        name="newRemark" 
                        value={formData.newRemark || ''} 
                        onChange={handleInput} 
                        className="w-full border rounded p-2 outline-none focus:border-[#E20015]" 
                        placeholder="เพิ่มคอมเมนต์ใหม่..." 
                      />
                    </div>
                  </div>
                </div>
                
                {/* Modal Footer */}
                <div className="bg-gray-50 p-3 border-t flex justify-between shrink-0">
                  {editId ? (
                    <button onClick={() => handleDelete(editId)} disabled={isSubmitting} className="px-3 py-1.5 rounded font-bold text-red-600 bg-white border flex gap-1 disabled:opacity-50">
                      <Trash2 className="w-3.5 h-3.5" /> ลบ
                    </button>
                  ) : (
                    <div></div>
                  )}
                  <div className="flex gap-2">
                    <button onClick={closeModal} className="px-3 py-1.5 rounded font-bold bg-white border">ยกเลิก</button>
                    <button onClick={handleSubmit} disabled={isSubmitting} className="px-4 py-1.5 rounded font-bold bg-[#E20015] text-white flex gap-1 disabled:bg-red-300">
                      {isSubmitting ? <RefreshCw className="w-3.5 h-3.5 animate-spin" /> : <Save className="w-3.5 h-3.5" />} บันทึก
                    </button>
                  </div>
                </div>
                
              </div>
            </div>
          )}

          {/* =============================== */}
          {/* View Record Modal */}
          {/* =============================== */}
          {viewRecord && (
            <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-end sm:items-center sm:p-4">
              <div className="bg-white w-full sm:rounded-xl sm:max-w-2xl max-h-[90vh] flex flex-col slide-up">
                
                {/* Modal Header */}
                <div className="bg-gray-50 p-3 border-b flex justify-between items-center rounded-t-xl">
                  <div className="flex items-center gap-1.5 font-black text-sm">
                    <Eye className="w-4 h-4 text-blue-600" /> รายละเอียด
                  </div>
                  <button onClick={closeViewModal}>
                    <X className="w-4 h-4 text-gray-500" />
                  </button>
                </div>
                
                {/* Modal Body */}
                <div className="p-4 overflow-y-auto custom-scrollbar text-xs">
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Eq. No.</span>
                      <span className="text-base font-black text-[#E20015]">{viewRecord.equipmentNo}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Insp. Date</span>
                      <span className="font-bold">{formatDateToDDMMYY(viewRecord.inspectionDate)}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Inspector</span>
                      <span className="font-bold">{viewRecord.inspectorName}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Product</span>
                      <span className="bg-gray-100 px-2 py-0.5 rounded font-bold">{viewRecord.productLine}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Type</span>
                      <span className="bg-gray-100 px-2 py-0.5 rounded font-bold">{viewRecord.type}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Unit</span>
                      <span className="font-bold">{viewRecord.unit}</span>
                    </div>
                    <div className="col-span-2 md:col-span-3">
                      <span className="text-[9px] text-gray-400 font-bold block">Job Site</span>
                      <span className="bg-gray-50 p-2 rounded block font-bold border">{viewRecord.jobSite}</span>
                    </div>
                  </div>
                  
                  <div className="border-t border-dashed my-3"></div>
                  
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block mb-1">Status</span>
                      <span className={`px-2 py-0.5 rounded text-[10px] font-bold border ${viewRecord.saisStatus === 'Passed with Completed' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : viewRecord.saisStatus === 'Failed' ? 'bg-red-100 text-red-700 border-red-200' : viewRecord.saisStatus === 'Passed with OIL' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-blue-50 text-blue-700'}`}>
                        {viewRecord.saisStatus || 'PENDING'}
                      </span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Condition</span>
                      <span className="font-bold">{viewRecord.condition || '-'}</span>
                    </div>
                    <div>
                      <span className="text-[9px] text-gray-400 font-bold block">Gen. Date</span>
                      <span className="font-bold">{formatDateToDDMMYY(viewRecord.generatedDate)}</span>
                    </div>
                    <div className="col-span-2 md:col-span-3">
                      <span className="text-[9px] text-gray-400 font-bold block">Sys/Pre/Buz</span>
                      <span className="font-bold">{viewRecord.generatedInSystem || '-'} / {viewRecord.preCheck || '-'} / {viewRecord.buzzer || '-'}</span>
                    </div>
                  </div>
                  
                  <div>
                    <span className="text-[9px] text-gray-400 font-bold block mb-1">
                      <MessageSquare className="w-3 h-3 inline" /> ประวัติคอมเมนต์
                    </span>
                    <div className="bg-gray-50 p-2 rounded border max-h-32 overflow-y-auto">
                      {(() => { 
                        const h = parseRemarkHistory(viewRecord.remark); 
                        if (!h.length || !h[0].text) return <div className="text-gray-400 text-center">ไม่มีข้อมูล</div>; 
                        return h.map((x, i) => (
                          <div key={i} className="bg-white p-1.5 rounded border mb-1">
                            <div className="flex justify-between mb-0.5">
                              <span className="text-[8px] text-gray-400">{x.date}</span>
                              <span className="text-[8px] font-bold text-gray-600">{x.author}</span>
                            </div>
                            <p className="text-[10px]">{x.text}</p>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                </div>
                
                {/* Modal Footer */}
                <div className="bg-gray-50 p-3 border-t flex justify-end gap-2 shrink-0">
                  <button onClick={closeViewModal} className="px-4 py-1.5 bg-white border rounded font-bold">ปิด</button>
                  <button onClick={() => { closeViewModal(); openEditModal(viewRecord); }} className="px-4 py-1.5 bg-blue-600 text-white rounded font-bold flex items-center gap-1">
                    <Edit className="w-3.5 h-3.5" /> แก้ไข
                  </button>
                </div>
                
              </div>
            </div>
          )}

        </div>
      );
    }
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
