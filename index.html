<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAIS DATABASE 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f9fafb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #E20015; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    .slide-up { animation: slideUp 0.3s ease-out forwards; }
    .toast-enter { animation: toastEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Animation สำหรับช่องที่กรอกไม่ครบ */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }

    .sticky-header th { position: sticky; top: 0; z-index: 10; background-color: #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .svg-chart text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    .resize-container::-webkit-scrollbar { display: none; }
    .resize-container { -ms-overflow-style: none; scrollbar-width: none; }
    .resizing { user-select: none; cursor: col-resize; }
  </style>
</head>
<body class="bg-[#F4F4F4] text-gray-800 antialiased overflow-x-hidden overscroll-y-contain font-sans">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useCallback } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Save, Plus, Trash2, FileSpreadsheet, Building2, ChevronRight, ChevronLeft, AlertCircle, X, Edit, ClipboardList, Clock, CheckCircle2, AlertTriangle, RefreshCw, Cloud, CloudOff, BarChart2, Filter, RotateCcw, Activity, ShieldAlert, Target, Award, Package, Eye, MessageSquare, Search, History, Settings, TrendingUp, PieChart, Users, Columns, HelpCircle, Info, LayoutDashboard, FileText, BookOpen, Check } from 'https://esm.sh/lucide-react@0.300.0';

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyvVssxbmdOnE5wypreTNxi9eYnDpkgXWO5grTMU1LklyuP7LwmON_X4YdZumxgS5uX/exec';
    
    const PRODUCT_LINES = ["3300", "5500", "7000", "ES1", "ES2", "ES3", "ES5.0", "ES5", "ESC", "MW", "S-Villa", "Flex-7"];
    const TYPES = ["NI", "MOD-R", "MOD-T", "NI CNX", "NI HKT"];
    const SAIS_STATUSES = ["Passed with Completed", "Passed with OIL", "Failed", "ยกเลิก"];
    const CONDITIONS = ["Final", "BUILDER LIFT", "TEMPORARY POWER SUPPLY"];
    const MONTHS = [{ value: 'all', label: 'ทุกเดือน' }, { value: '01', label: 'มกราคม' }, { value: '02', label: 'กุมภาพันธ์' }, { value: '03', label: 'มีนาคม' }, { value: '04', label: 'เมษายน' }, { value: '05', label: 'พฤษภาคม' }, { value: '06', label: 'มิถุนายน' }, { value: '07', label: 'กรกฎาคม' }, { value: '08', label: 'สิงหาคม' }, { value: '09', label: 'กันยายน' }, { value: '10', label: 'ตุลาคม' }, { value: '11', label: 'พฤศจิกายน' }, { value: '12', label: 'ธันวาคม' }];
    const DEFAULT_INSPECTORS = ["Thongchai Chalothornnarumit", "Prayod Yoprakhon", "Choosak Choomuang", "Pradit Mingson", "Teeratat Piyasakaksorn", "Matee Khanti", "Narong Robrum", "Chakrin Dangwichai"];
    const STANDARD_UNITS = ["L1", "L2", "PL1", "PL2", "SL1"];
    
    const DEFAULT_WIDTHS = {
      no: 40, inspDate: 100, eqNo: 110, genDate: 100, sys: 100, insp: 130,
      prod: 80, type: 80, site: 150, unit: 70, cond: 110, pre: 80, buz: 70, remark: 150, status: 110
    };

    const COLUMNS_DEF = [
      { id: 'no', label: 'No.' }, { id: 'inspDate', label: 'Inspection Date' }, { id: 'eqNo', label: 'Equipment No.' },
      { id: 'genDate', label: 'Generated Date' }, { id: 'sys', label: 'Generated In System' }, { id: 'insp', label: 'Inspector Name' },
      { id: 'prod', label: 'Product Line' }, { id: 'type', label: 'Type' }, { id: 'site', label: 'Job Site' },
      { id: 'unit', label: 'Unit' }, { id: 'cond', label: 'Condition' }, { id: 'pre', label: 'Pre Check' },
      { id: 'buz', label: 'Buzzer' }, { id: 'remark', label: 'Remark' }, { id: 'status', label: 'SAIS Status' }
    ];

    const formatDateToDDMMYY = (d) => { if (!d) return '-'; const date = new Date(d); return isNaN(date.getTime()) ? '-' : `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getFullYear()).slice(-2)}`; };
    const formatDateForInput = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; };
    const getMonthOnly = (d) => { if (!d) return ''; const date = new Date(d); return isNaN(date.getTime()) ? '' : String(date.getMonth() + 1).padStart(2, '0'); };
    const formatSyncTime = (d) => d ? `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}` : '';
    const generateUniqueId = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
    const parseRemarkHistory = (str) => { try { const p = JSON.parse(str); return Array.isArray(p) ? p : [{ text: str, date: '-', author: 'System' }]; } catch(e) { return str ? [{ text: str, date: '-', author: 'System' }] : []; } };

    function App() {
      const currentMonthStr = String(new Date().getMonth() + 1).padStart(2, '0');
      const [records, setRecords] = useState([]);
      const [activeTab, setActiveTab] = useState('records'); 
      const [filterMonth, setFilterMonth] = useState(currentMonthStr);
      const [searchTerm, setSearchTerm] = useState('');
      
      const [tableFilters, setTableFilters] = useState({ inspDate: '', eqNo: '', genDate: '', sys: '', insp: '', prod: '', type: '', site: '', unit: '', cond: '', pre: '', buz: '', status: '' });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [viewRecord, setViewRecord] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle'); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [lastSyncedAt, setLastSyncedAt] = useState(null); 
      const [isNavVisible, setIsNavVisible] = useState(true);
      const [lastScrollY, setLastScrollY] = useState(0);
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 30; 
      const [toast, setToast] = useState(null);
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [inspectorsData, setInspectorsData] = useState(() => DEFAULT_INSPECTORS.map(name => ({ name, certs: [...PRODUCT_LINES] })));

      const [isColMenuOpen, setIsColMenuOpen] = useState(false);
      const [hiddenCols, setHiddenCols] = useState(() => {
         const saved = localStorage.getItem('sais_hidden_cols');
         return saved ? new Set(JSON.parse(saved)) : new Set();
      });
      useEffect(() => { localStorage.setItem('sais_hidden_cols', JSON.stringify([...hiddenCols])); }, [hiddenCols]);

      const [colWidths, setColWidths] = useState(() => {
         const saved = localStorage.getItem('sais_col_widths');
         return saved ? JSON.parse(saved) : DEFAULT_WIDTHS;
      });
      useEffect(() => { localStorage.setItem('sais_col_widths', JSON.stringify(colWidths)); }, [colWidths]);

      const [resizing, setResizing] = useState(null);

      const startResize = (e, colId) => {
         e.preventDefault();
         setResizing({ id: colId, startX: e.clientX, startWidth: colWidths[colId] || DEFAULT_WIDTHS[colId] });
      };

      useEffect(() => {
         const handleMouseMove = (e) => {
            if (!resizing) return;
            const diff = e.clientX - resizing.startX;
            const newWidth = Math.max(40, resizing.startWidth + diff); 
            setColWidths(prev => ({ ...prev, [resizing.id]: newWidth }));
         };
         const handleMouseUp = () => { setResizing(null); };

         if (resizing) {
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            document.body.classList.add('resizing');
         } else {
            document.body.classList.remove('resizing');
         }

         return () => {
            window.removeEventListener('mousemove', handleMouseMove);
            window.removeEventListener('mouseup', handleMouseUp);
            document.body.classList.remove('resizing');
         };
      }, [resizing]);

      const [isHelpOpen, setIsHelpOpen] = useState(false);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const closeViewModal = () => setViewRecord(null);

      const initialFormState = { equipmentNo: '', inspectionDate: '', generatedDate: '', generatedInSystem: '', inspectorName: '', productLine: '', type: '', jobSite: '', unit: '', preCheck: '', buzzer: '', saisStatus: '', condition: '', remark: '', newRemark: '' };
      const [formData, setFormData] = useState(initialFormState);
      const [validationError, setValidationError] = useState('');
      
      const [missingFields, setMissingFields] = useState([]);

      const fetchRecords = useCallback(async (isSilent = false) => {
        if (!isSilent) setSyncStatus('syncing');
        try {
          const res = await fetch(GAS_WEB_APP_URL); if (!res.ok) throw new Error('Net Error');
          const data = await res.json();
          if (data && data.records && Array.isArray(data.records)) {
             setRecords(data.records.filter(i => i.id && i.id.toString().trim() !== ''));
             if (data.inspectors && Array.isArray(data.inspectors) && data.inspectors.length > 0) {
                 const parsedInspectors = data.inspectors.map(i => {
                     let parsedCerts = [];
                     try { parsedCerts = JSON.parse(i.certs); } catch(e) {}
                     return { name: i.name, certs: Array.isArray(parsedCerts) ? parsedCerts : [] };
                 });
                 setInspectorsData(parsedInspectors);
             }
             setSyncStatus('success'); setLastSyncedAt(new Date());
          } 
          else if (Array.isArray(data)) { setRecords(data.filter(i => i.id && i.id.toString().trim() !== '')); setSyncStatus('success'); setLastSyncedAt(new Date()); }
          else { setRecords([]); setSyncStatus('idle'); }
        } catch (e) { setSyncStatus('error'); if (!isSilent) showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error'); }
      }, []);

      useEffect(() => { fetchRecords(); }, [fetchRecords]);

      useEffect(() => {
        let startY = 0;
        const ts = (e) => { if (window.scrollY === 0) startY = e.touches[0].clientY; };
        const te = (e) => { if (window.scrollY === 0 && startY > 0 && e.changedTouches[0].clientY - startY > 100) { showToast('อัปเดตข้อมูล...', 'success'); fetchRecords(false); } startY = 0; };
        window.addEventListener('touchstart', ts, { passive: true }); window.addEventListener('touchend', te, { passive: true });
        return () => { window.removeEventListener('touchstart', ts); window.removeEventListener('touchend', te); };
      }, [fetchRecords]);

      useEffect(() => {
        const handleScroll = () => { setIsNavVisible(window.scrollY < lastScrollY || window.scrollY < 50); setLastScrollY(window.scrollY); };
        window.addEventListener('scroll', handleScroll, { passive: true }); return () => window.removeEventListener('scroll', handleScroll);
      }, [lastScrollY]);

      useEffect(() => { setCurrentPage(1); }, [activeTab, filterMonth, searchTerm, tableFilters]);

      const latestInspectionDate = useMemo(() => { const sorted = [...records].sort((a, b) => new Date(b.inspectionDate || 0) - new Date(a.inspectionDate || 0)); return sorted[0]?.inspectionDate || ''; }, [records]);

      const uniqueTableOptions = useMemo(() => {
         const opts = { inspDate: new Set(), eqNo: new Set(), genDate: new Set(), sys: new Set(), insp: new Set(), prod: new Set(), type: new Set(), site: new Set(), unit: new Set(), cond: new Set(), pre: new Set(), buz: new Set(), status: new Set() };
         records.forEach(r => {
            if(r.inspectionDate) { const d = formatDateToDDMMYY(r.inspectionDate); if(d !== '-') opts.inspDate.add(d); }
            if(r.equipmentNo) opts.eqNo.add(String(r.equipmentNo).trim());
            if(r.generatedDate) { const d = formatDateToDDMMYY(r.generatedDate); if(d !== '-') opts.genDate.add(d); }
            if(r.jobSite && r.jobSite.trim() !== '') opts.site.add(r.jobSite.trim());
            if(r.generatedInSystem && r.generatedInSystem.trim() !== '') opts.sys.add(r.generatedInSystem);
            if(r.inspectorName && r.inspectorName.trim() !== '') opts.insp.add(r.inspectorName);
            if(r.productLine && r.productLine.trim() !== '') opts.prod.add(r.productLine);
            if(r.type && r.type.trim() !== '') opts.type.add(r.type);
            if(r.unit && r.unit.trim() !== '') opts.unit.add(r.unit);
            if(r.condition && r.condition.trim() !== '') opts.cond.add(r.condition);
            if(r.preCheck && r.preCheck.trim() !== '') opts.pre.add(r.preCheck);
            if(r.buzzer && r.buzzer.trim() !== '') opts.buz.add(r.buzzer);
            if(r.saisStatus && r.saisStatus.trim() !== '') opts.status.add(r.saisStatus);
         });
         return {
            inspDate: [...opts.inspDate].sort(), eqNo: [...opts.eqNo].sort(), genDate: [...opts.genDate].sort(), site: [...opts.site].sort(),
            sys: [...opts.sys].sort(), insp: [...opts.insp].sort(), prod: [...opts.prod].sort(), type: [...opts.type].sort(),
            unit: [...opts.unit].sort(), cond: [...opts.cond].sort(), pre: [...opts.pre].sort(), buz: [...opts.buz].sort(), status: [...opts.status].sort()
         };
      }, [records]);

      const displayedRecords = useMemo(() => {
        return records.filter(rec => {
          if (filterMonth !== 'all' && getMonthOnly(rec.inspectionDate) !== filterMonth) return false;
          if (searchTerm) { const s = searchTerm.toLowerCase(); if (!String(rec.equipmentNo||'').toLowerCase().includes(s) && !String(rec.jobSite||'').toLowerCase().includes(s)) return false; }
          if (tableFilters.inspDate && formatDateToDDMMYY(rec.inspectionDate) !== tableFilters.inspDate) return false;
          if (tableFilters.eqNo && String(rec.equipmentNo).trim() !== tableFilters.eqNo) return false;
          if (tableFilters.genDate && formatDateToDDMMYY(rec.generatedDate) !== tableFilters.genDate) return false;
          if (tableFilters.site && String(rec.jobSite).trim() !== tableFilters.site) return false;
          if (tableFilters.sys && rec.generatedInSystem !== tableFilters.sys) return false;
          if (tableFilters.insp && rec.inspectorName !== tableFilters.insp) return false;
          if (tableFilters.prod && rec.productLine !== tableFilters.prod) return false;
          if (tableFilters.type && rec.type !== tableFilters.type) return false;
          if (tableFilters.unit && rec.unit !== tableFilters.unit) return false;
          if (tableFilters.cond && rec.condition !== tableFilters.cond) return false;
          if (tableFilters.pre && rec.preCheck !== tableFilters.pre) return false;
          if (tableFilters.buz && rec.buzzer !== tableFilters.buz) return false;
          if (tableFilters.status && rec.saisStatus !== tableFilters.status) return false;
          return true;
        }).sort((a, b) => {
           const dA = new Date(a.inspectionDate || 0).getTime(); const dB = new Date(b.inspectionDate || 0).getTime();
           if (!isNaN(dA) && !isNaN(dB)) { if (dA !== dB) return dA - dB; } return parseInt(a.id || 0) - parseInt(b.id || 0);
        });
      }, [records, filterMonth, searchTerm, tableFilters]);

      const totalPages = Math.ceil(displayedRecords.length / ITEMS_PER_PAGE);
      const paginatedRecords = useMemo(() => displayedRecords.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE), [displayedRecords, currentPage]);
      const processedPaginatedRecords = useMemo(() => {
        let currentBgIsGray = false; let lastProcessedDate = null;
        return paginatedRecords.map((r, i) => {
          const rDate = formatDateToDDMMYY(r.inspectionDate); let showDate = false;
          if (rDate !== lastProcessedDate) { showDate = true; if (i > 0) currentBgIsGray = !currentBgIsGray; lastProcessedDate = rDate; }
          return { ...r, displayDateFormatted: rDate, showDate: showDate, bgClass: currentBgIsGray ? 'bg-gray-100' : 'bg-white' };
        });
      }, [paginatedRecords]);

      const handleInput = (e) => { 
        setFormData(p => ({ ...p, [e.target.name]: e.target.value })); 
        setValidationError(''); 
        if (missingFields.includes(e.target.name)) {
            setMissingFields(p => p.filter(f => f !== e.target.name));
        }
      };

      const handleTableFilter = (e) => { const { name, value } = e.target; setTableFilters(prev => ({ ...prev, [name]: value })); };
      const hasTableFilters = Object.values(tableFilters).some(v => v !== '');
      const clearTableFilters = () => setTableFilters({ inspDate: '', eqNo: '', genDate: '', site: '', sys: '', insp: '', prod: '', type: '', unit: '', cond: '', pre: '', buz: '', status: '' });
      
      const toggleColumn = (colId) => {
        const newHidden = new Set(hiddenCols);
        if (newHidden.has(colId)) newHidden.delete(colId);
        else newHidden.add(colId);
        setHiddenCols(newHidden);
      };
      const clearHiddenCols = () => setHiddenCols(new Set());
      const resetColWidths = () => setColWidths(DEFAULT_WIDTHS);

      const openAddModal = () => { 
        setFormData({ ...initialFormState, inspectionDate: formatDateForInput(latestInspectionDate) || (filterMonth !== 'all' ? `2026-${filterMonth}-01` : '') }); 
        setEditId(null); 
        setValidationError(''); 
        setMissingFields([]); 
        setIsModalOpen(true); 
      };
      const closeModal = () => setIsModalOpen(false);
      const openViewModal = (r) => setViewRecord(r);
      const openEditModal = (r) => { 
        setFormData({ ...r, inspectionDate: formatDateForInput(r.inspectionDate), generatedDate: formatDateForInput(r.generatedDate), newRemark: '' }); 
        setEditId(r.id); 
        setValidationError(''); 
        setMissingFields([]); 
        setIsModalOpen(true); 
      };

      const syncDb = async (payload, msg) => {
        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
          const text = await res.text(); let out;
          try { out = JSON.parse(text); } catch(e) { throw new Error("Invalid Server Response"); }
          if(out.status === 'success') { setLastSyncedAt(new Date()); showToast(msg); } else throw new Error(out.message || "Unknown Error");
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const saveSettingsOnline = async () => {
         setIsSubmitting(true);
         try {
            const payload = { action: 'SAVE_SETTINGS', inspectors: inspectorsData };
            const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
            const text = await res.text(); let out;
            try { out = JSON.parse(text); } catch(e) { throw new Error("Invalid Server Response"); }
            if(out.status === 'success') { showToast('บันทึกตั้งค่าขึ้นสู่ระบบออนไลน์สำเร็จ', 'success'); setIsSettingsOpen(false); } 
            else { throw new Error(out.message || "Unknown Error"); }
         } catch(err) { showToast(`Error: ${err.message}`, 'error'); } finally { setIsSubmitting(false); }
      };

      const handleSubmit = async (e) => {
        e.preventDefault(); if (isSubmitting) return; 
        setValidationError('');
        setMissingFields([]);

        try {
            const req = ['equipmentNo', 'inspectionDate', 'inspectorName', 'productLine', 'type', 'jobSite', 'unit'];
            const missing = req.filter(f => !formData[f] || String(formData[f]).trim() === '');
            
            if (missing.length > 0) {
                setMissingFields(missing);
                return setValidationError(`กรุณากรอกข้อมูลสำคัญให้ครบถ้วน: ${missing.join(', ')}`);
            }

            const eqString = String(formData.equipmentNo).trim(); const eqRegex = /^\d+$/;
            if (!eqRegex.test(eqString)) {
                setMissingFields(['equipmentNo']);
                return setValidationError('รูปแบบ Eq No. ไม่ถูกต้อง (ต้องเป็นตัวเลขเท่านั้น)');
            }
            if (formData.generatedDate && formData.inspectionDate) {
              const genDate = new Date(formData.generatedDate); const inspDate = new Date(formData.inspectionDate);
              genDate.setHours(0,0,0,0); inspDate.setHours(0,0,0,0);
              if (genDate < inspDate) return setValidationError('วันที่ Gen Date ต้องไม่ก่อนวันที่ Inspection Date');
            }
            
            setIsSubmitting(true);
            const og = editId ? records.find(r => String(r.id) === String(editId)) : null;
            let hist = parseRemarkHistory(og?.remark);
            if (formData.newRemark && String(formData.newRemark).trim()) { hist.push({ text: String(formData.newRemark).trim(), date: formatDateToDDMMYY(new Date()), author: formData.inspectorName || 'System' }); }
            const pData = { ...formData, equipmentNo: eqString, displayInspectionDate: formatDateToDDMMYY(formData.inspectionDate), displayGeneratedDate: formatDateToDDMMYY(formData.generatedDate), remark: JSON.stringify(hist) };
            delete pData.newRemark;
            let target, msg;
            if (editId) { target = { ...pData, id: editId }; setRecords(p => p.map(r => String(r.id) === String(editId) ? target : r)); msg = 'อัปเดตสำเร็จ'; } 
            else { target = { ...pData, id: generateUniqueId() }; setRecords(p => [target, ...p]); msg = 'เพิ่มสำเร็จ'; }
            closeModal(); await syncDb({ action: 'SAVE', record: target }, msg);
        } catch (err) { setValidationError(`ระบบขัดข้อง: ${err.message}`); setIsSubmitting(false); }
      };

      const handleDelete = (id) => { if(window.confirm('ยืนยันลบถาวร?')) { setIsSubmitting(true); setRecords(p => p.filter(r => String(r.id) !== String(id))); closeModal(); syncDb({ action: 'DELETE', id }, 'ลบสำเร็จ'); } };

      const updateInspectorName = (idx, newName) => { const newData = [...inspectorsData]; newData[idx].name = newName; setInspectorsData(newData); };
      const toggleCert = (idx, pl) => { 
        const newData = [...inspectorsData]; 
        if (newData[idx].certs.includes(pl)) newData[idx].certs = newData[idx].certs.filter(c => c !== pl); 
        else newData[idx].certs.push(pl); 
        setInspectorsData(newData); 
      };
      const deleteInspector = (idx) => { if(window.confirm('ลบรายชื่อนี้?')) setInspectorsData(inspectorsData.filter((_, i) => i !== idx)); };
      const addInspector = () => setInspectorsData([...inspectorsData, { name: 'New Inspector', certs: [] }]);
      const selectAllCerts = (idx) => { const newData = [...inspectorsData]; newData[idx].certs = [...PRODUCT_LINES]; setInspectorsData(newData); };
      const clearAllCerts = (idx) => { const newData = [...inspectorsData]; newData[idx].certs = []; setInspectorsData(newData); };

      const renderDashboard = () => {
        let stats = { total: 0, fpy: 0, failed: 0 };
        displayedRecords.forEach(r => {
          if (r.saisStatus === 'ยกเลิก') return;
          stats.total++;
          if (r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') stats.fpy++;
          if (r.saisStatus === 'Failed') stats.failed++;
        });
        const fpyRate = stats.total > 0 ? Math.round((stats.fpy / stats.total) * 100) : 0;

        const statusRawData = [ { label: 'Passed (FPY)', value: stats.fpy, color: '#10b981' }, { label: 'Failed Defect', value: stats.failed, color: '#ef4444' } ].filter(d => d.value > 0);
        const totalStatus = statusRawData.reduce((acc, curr) => acc + curr.value, 0);
        let accPercent = 0;
        const donutSegments = statusRawData.map(d => {
           const percent = totalStatus > 0 ? (d.value / totalStatus) * 100 : 0; const dashArray = `${percent} ${100 - percent}`; const dashOffset = 25 - accPercent; accPercent += percent; return { ...d, percent, dashArray, dashOffset };
        });

        const productStats = {};
        displayedRecords.forEach(r => {
           if (r.saisStatus === 'ยกเลิก' || !r.productLine) return;
           if(!productStats[r.productLine]) productStats[r.productLine] = { total: 0, failed: 0 };
           productStats[r.productLine].total++;
           if(r.saisStatus === 'Failed') productStats[r.productLine].failed++;
        });
        const barData = Object.entries(productStats).map(([name, data]) => ({ name, ...data })).sort((a,b) => b.total - a.total).slice(0, 8); 
        const maxBar = Math.max(...barData.map(d => d.total), 1);

        const inspectorStats = {};
        displayedRecords.forEach(r => {
           if (r.saisStatus === 'ยกเลิก' || !r.inspectorName) return;
           if(!inspectorStats[r.inspectorName]) inspectorStats[r.inspectorName] = { total: 0, fpy: 0 };
           inspectorStats[r.inspectorName].total++;
           if(r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') inspectorStats[r.inspectorName].fpy++;
        });
        const leaderboardData = Object.entries(inspectorStats).map(([name, data]) => ({ name, ...data })).sort((a,b) => b.total - a.total);

        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const trendData = monthNames.map(m => ({ month: m, total: 0, fpy: 0 }));
        records.filter(r => r.saisStatus !== 'ยกเลิก').forEach(r => {
            if(!r.inspectionDate) return;
            const d = new Date(r.inspectionDate);
            if(!isNaN(d.getTime())) { const mIdx = d.getMonth(); trendData[mIdx].total++; if(r.saisStatus === 'Passed with Completed' || r.saisStatus === 'Passed with OIL') trendData[mIdx].fpy++; }
        });
        const maxTrend = Math.max(...trendData.map(d => d.total), 1);

        return (
          <div className="space-y-4 fade-in pb-10 mt-4">
            {displayedRecords.length === 0 ? <div className="bg-white rounded-xl shadow-sm p-10 text-center"><Activity className="w-12 h-12 text-gray-200 mx-auto mb-2 animate-pulse"/><h3 className="font-bold text-gray-500">ไม่พบข้อมูล</h3></div> : (
              <>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-5 rounded-xl border border-blue-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><Target className="w-24 h-24 text-blue-500" /></div>
                     <span className="text-[10px] font-bold text-blue-600 uppercase mb-1">First Pass Yield</span>
                     <div className="text-3xl font-black text-gray-800">{fpyRate}%</div>
                     <span className="text-[10px] text-gray-500 mt-1">ตรวจผ่าน (ไม่ Failed)</span>
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-red-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><ShieldAlert className="w-24 h-24 text-red-500" /></div>
                     <span className="text-[10px] font-bold text-red-600 uppercase mb-1">Failed Defects</span>
                     <div className="text-3xl font-black text-gray-800">{stats.failed} <span className="text-sm text-gray-400">งาน</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">ต้องแก้ไข (Rework)</span>
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 opacity-10"><Package className="w-24 h-24 text-gray-500" /></div>
                     <span className="text-[10px] font-bold text-gray-600 uppercase mb-1">Total Inspected</span>
                     <div className="text-3xl font-black text-gray-800">{stats.total} <span className="text-sm text-gray-400">งาน</span></div>
                     <span className="text-[10px] text-gray-500 mt-1">ยอดเข้าตรวจทั้งหมด</span>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                      <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2 mb-4"><PieChart className="w-4 h-4 text-blue-500"/> สัดส่วนผลการตรวจ</h3>
                      <div className="flex flex-1 items-center justify-center gap-6">
                         {totalStatus === 0 ? <span className="text-gray-400 text-xs font-bold">ไม่มีข้อมูล</span> : (
                           <>
                              <div className="w-32 h-32 relative svg-chart">
                                <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                                   {donutSegments.map((s, i) => (
                                     <circle key={i} cx="18" cy="18" r="15.9155" fill="transparent" stroke={s.color} strokeWidth="4" strokeDasharray={s.dashArray} strokeDashoffset={s.dashOffset} />
                                   ))}
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                   <span className="text-2xl font-black text-gray-800 leading-none">{totalStatus}</span>
                                   <span className="text-[10px] font-bold text-gray-400">TOTAL</span>
                                </div>
                              </div>
                              <div className="space-y-2 text-xs">
                                 {donutSegments.map((s, i) => (
                                    <div key={i} className="flex items-center gap-2">
                                       <div className="w-3 h-3 rounded-sm" style={{backgroundColor: s.color}}></div>
                                       <span className="font-bold text-gray-700 w-24 truncate">{s.label}</span>
                                       <span className="text-gray-500 font-medium">{Math.round(s.percent)}% <span className="text-[10px]">({s.value})</span></span>
                                    </div>
                                 ))}
                              </div>
                           </>
                         )}
                      </div>
                   </div>

                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                      <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2 mb-4"><BarChart2 className="w-4 h-4 text-indigo-500"/> ผลงานตาม Product Line (Top 8)</h3>
                      <div className="flex-1 w-full h-40 svg-chart relative">
                         {barData.length === 0 ? <div className="absolute inset-0 flex justify-center items-center text-xs font-bold text-gray-400">ไม่มีข้อมูล</div> : (
                           <svg viewBox="0 0 400 160" className="w-full h-full preserve-3d">
                              {barData.map((d, i) => {
                                  const barWidth = 360 / barData.length - 8;
                                  const barHeight = (d.total / maxBar) * 120;
                                  const x = i * (barWidth + 8) + 20;
                                  const y = 140 - barHeight;
                                  const color = d.failed > 0 ? '#ef4444' : '#6366f1'; 
                                  return (
                                     <g key={i}>
                                        <rect x={x} y={y} width={barWidth} height={barHeight} fill={color} rx="2" className="transition-all duration-300" />

                                        <text x={x + barWidth/2} y={y - 5} fontSize="10" textAnchor="middle" fill={color} fontWeight="bold">{d.total}</text>
                                     </g>
                                  )
                              })}
                           </svg>
                         )}
                      </div>
                      <div className="text-[9px] text-gray-400 text-center mt-1">* แท่งสีแดง = มีสถานะ Failed ปะปนอยู่</div>

                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm lg:col-span-2 flex flex-col">

                      <div className="flex-1 w-full h-48 svg-chart relative">
                         <svg viewBox="0 0 500 180" className="w-full h-full">
                            <line x1="30" y1="20" x2="480" y2="20" stroke="#f3f4f6" strokeWidth="1" />
                            <line x1="30" y1="80" x2="480" y2="80" stroke="#f3f4f6" strokeWidth="1" />
                            <line x1="30" y1="140" x2="480" y2="140" stroke="#f3f4f6" strokeWidth="1" />
                            <text x="25" y="24" fontSize="9" textAnchor="end" fill="#9ca3af">{maxTrend}</text>
                            <text x="25" y="84" fontSize="9" textAnchor="end" fill="#9ca3af">{Math.round(maxTrend/2)}</text>
                            <text x="25" y="144" fontSize="9" textAnchor="end" fill="#9ca3af">0</text>
                            
                            {(() => {
                                const step = 450 / 11;
                                const pointsTotal = trendData.map((d,i) => `${40 + i*step},${140 - (d.total/maxTrend)*120}`).join(' ');
                                const pointsFpy = trendData.map((d,i) => `${40 + i*step},${140 - (d.fpy/maxTrend)*120}`).join(' ');
                                
                                return (
                                   <>
                                      <polyline points={pointsTotal} fill="none" stroke="#d1d5db" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                                      <polyline points={pointsFpy} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                                      {trendData.map((d,i) => (
                                         <g key={i}>
                                           <circle cx={40 + i*step} cy={140 - (d.total/maxTrend)*120} r="3" fill="#d1d5db" />
                                           <circle cx={40 + i*step} cy={140 - (d.fpy/maxTrend)*120} r="3" fill="#3b82f6" />
                                           <text x={40 + i*step} y={160} fontSize="9" textAnchor="middle" fill="#6b7280" fontWeight="bold">{d.month}</text>
                                           {d.total > 0 && <text x={40 + i*step} y={140 - (d.total/maxTrend)*120 - 8} fontSize="8" textAnchor="middle" fill="#9ca3af">{d.total}</text>}
                                         </g>
                                      ))}
                                   </>
                                )
                            })()}
                         </svg>
                      </div>
                      <div className="flex justify-center gap-4 mt-2 text-[10px] font-bold">
                         <div className="flex items-center gap-1"><span className="w-3 h-1 bg-gray-300 rounded-full"></span> Total Inspected</div>
                         <div className="flex items-center gap-1"><span className="w-3 h-1 bg-blue-500 rounded-full"></span> FPY (Pass/OIL)</div>
                      </div>
                   </div>

                   <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                      <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2 mb-4"><Users className="w-4 h-4 text-purple-500"/> Inspector Leaderboard</h3>
                      <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3 max-h-48">
                         {leaderboardData.length === 0 ? <div className="text-center text-xs font-bold text-gray-400 mt-10">ไม่มีข้อมูล</div> : (
                            leaderboardData.map((d, i) => {
                               const rate = d.total > 0 ? Math.round((d.fpy / d.total) * 100) : 0;
                               return (
                               <div key={i} className="flex items-center justify-between">
                                  <div className="flex items-center gap-2">
                                     <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black ${i===0?'bg-yellow-100 text-yellow-700':i===1?'bg-gray-100 text-gray-600':i===2?'bg-orange-50 text-orange-700':'bg-gray-50 text-gray-400'}`}>
                                        {i+1}
                                     </div>
                                     <div className="text-xs font-bold text-gray-700 w-24 truncate">{d.name}</div>
                                  </div>
                                  <div className="flex items-center gap-2 text-xs">
                                     <span className={`px-1.5 py-0.5 rounded text-[9px] font-black ${rate === 100 ? 'bg-green-100 text-green-700' : rate >= 80 ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>
                                       FPY {rate}%
                                     </span>
                                     <span className="font-black text-gray-900 bg-gray-100 px-2 py-0.5 rounded" title="Total Inspected">{d.total}</span>
                                  </div>
                               </div>
                               )
                            })
                         )}
                      </div>
                   </div>
                </div>
              </>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-2 sm:p-4 md:p-6 pb-24 md:pb-28 relative">
          {toast && <div className="fixed top-4 right-4 z-50 toast-enter"><div className={`flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-bold text-white ${toast.type==='error'?'bg-red-600':'bg-green-600'}`}>{toast.message}</div></div>}
          
          <div className="max-w-[1450px] mx-auto space-y-4">
            <div className="bg-white rounded-xl shadow-sm border-t-4 border-[#E20015] p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center relative">
              <div className="absolute top-2 right-2 flex items-center bg-gray-50 rounded px-2 py-1 z-10 text-[10px] font-bold text-gray-500">
                {syncStatus==='syncing'?<><RefreshCw className="w-3 h-3 text-blue-500 animate-spin mr-1"/> โหลด...</>:syncStatus==='success'?<><Cloud className="w-3 h-3 text-green-600 mr-1"/> {formatSyncTime(lastSyncedAt)}</>:<><CloudOff className="w-3 h-3 text-red-500 mr-1"/> ล้มเหลว</>}
              </div>
              <div className="flex items-center gap-3 w-full justify-between mt-4 sm:mt-0">
                <div className="flex items-center gap-3">
                   <div className="bg-[#E20015] p-2 rounded-lg text-white hidden sm:block"><Building2 className="w-6 h-6" /></div>
                   <div><h1 className="text-xl sm:text-2xl font-black text-gray-900 leading-none">SAIS <span className="text-[#E20015]">DATABASE</span> 2026</h1><div className="flex items-center gap-2 mt-2"><span className="text-xs font-bold text-gray-500">รอบ:</span><select value={filterMonth} onChange={(e)=>setFilterMonth(e.target.value)} className="bg-gray-100 border text-xs font-bold rounded p-1 outline-none">{MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</select></div></div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setIsHelpOpen(true)} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors" title="คู่มือการใช้งาน">
                    <BookOpen className="w-5 h-5" />
                  </button>
                  <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors" title="ตั้งค่ารายชื่อ Inspector">
                    <Settings className="w-5 h-5" />
                  </button>
                </div>
              </div>
            </div>

            {activeTab === 'dashboard' ? renderDashboard() : (
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 fade-in flex flex-col">
                <div className="p-3 border-b flex flex-col sm:flex-row justify-between items-center gap-3 bg-gray-50">
                  <h3 className="font-bold text-sm flex items-center gap-2">
                    <FileSpreadsheet className="text-blue-600 w-4 h-4"/>

                    <span className="bg-gray-800 text-white text-[10px] px-2 rounded-full">{displayedRecords.length}</span>

                    {hasTableFilters && (
                       <button onClick={clearTableFilters} className="flex items-center justify-center gap-1 bg-red-50 text-red-600 px-3 py-1.5 rounded-md font-bold text-xs shrink-0 border border-red-200 active:scale-95">
                          <X className="w-3 h-3" /> ล้างตัวกรอง

                    <div className="relative w-full sm:w-48"><Search className="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" /><input type="text" placeholder="ค้นหา Eq No / Site..." value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} className="w-full bg-white border rounded-md pl-8 pr-2 py-1.5 text-xs outline-none focus:border-[#E20015]" /></div>

                        {!hiddenCols.has('inspDate') && (

                                <div className="text-gray-600 font-bold text-center">Inspection Date</div>
                            </div>
                            <select name="inspDate" value={tableFilters.inspDate} onChange={handleTableFilter} className="w-full border border-gray-300 rounded bg-white text-gray-800 text-[10px] p-0.5 outline-none font-bold cursor-pointer mt-1"><option value="">ทั้งหมด</option>{uniqueTableOptions.inspDate.map(x=><option key={x} value={x}>{x}</option>)}</select>

      );
    }
    createRoot(document.getElementById('root')).render(<App />);
  </script>
